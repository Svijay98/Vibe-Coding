<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naruto Hand Sign Challenge</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #f0f0f0; min-height: 100vh; }

#loading-screen {
  position: fixed; inset: 0; background: #0a0a0a;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 100; gap: 16px;
}
#loading-screen h1 { font-size: 26px; font-weight: 700; color: #f97316; }
#loading-screen p  { font-size: 13px; color: #555; }
.spinner { width: 40px; height: 40px; border: 3px solid #222; border-top-color: #f97316; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

#app { display: none; flex-direction: column; max-width: 1200px; margin: 0 auto; padding: 14px; }
header { text-align: center; padding: 6px 0 12px; }
header h1 { font-size: 22px; font-weight: 700; color: #f97316; letter-spacing: 0.04em; }
header p  { font-size: 12px; color: #444; margin-top: 3px; }

#jutsu-row { display: flex; gap: 7px; flex-wrap: wrap; justify-content: center; margin-bottom: 12px; }
.jbtn { padding: 6px 15px; border-radius: 6px; border: 1px solid #2a2a2a; background: #141414; color: #aaa; font-size: 12px; cursor: pointer; transition: all 0.15s; font-weight: 500; }
.jbtn:hover { background: #1e1e1e; border-color: #444; }
.jbtn.active { background: #3a0f00; border-color: #f97316; color: #ffbb80; }

#main { display: flex; gap: 14px; align-items: flex-start; }

/* BIGGER camera */
#cam-wrap {
  position: relative; flex-shrink: 0;
  border-radius: 14px; overflow: hidden;
  border: 1px solid #222;
  width: 640px;
}
#cam-wrap video  { display: block; width: 640px; height: auto; }
#cam-wrap canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
#video   { transform: scaleX(-1); }
#overlay { transform: scaleX(-1); }

#panel { flex: 1; min-width: 260px; display: flex; flex-direction: column; gap: 9px; }
.card { background: #141414; border: 1px solid #222; border-radius: 10px; padding: 12px; }

#seal-ref { text-align: center; }
#seal-ref .step-label { font-size: 10px; color: #444; margin-bottom: 3px; }
#seal-ref .seal-name  { font-size: 17px; font-weight: 700; color: #f97316; margin-bottom: 5px; }
#seal-ref .seal-hint  { font-size: 10px; color: #555; margin-top: 6px; line-height: 1.6; display: inline-block; max-width: 250px; }
#seal-ref .idle       { font-size: 13px; color: #333; padding: 20px 0; }
#seal-ref img         { border-radius: 8px; border: 1px solid #1e1e1e; }

.progress-seals { display: flex; gap: 5px; flex-wrap: wrap; }
.ps {
  min-width: 36px; height: 25px; padding: 0 7px; border-radius: 5px;
  border: 1px solid #222; background: #0e0e0e; display: flex;
  align-items: center; justify-content: center;
  font-size: 10px; font-weight: 600; color: #333; transition: all 0.2s;
}
.ps.done   { background: #041a0e; border-color: #15803d; color: #15803d; }
.ps.active { background: #3a0f00; border-color: #f97316; color: #f97316; box-shadow: 0 0 0 2px #f9731622; }

#status-pill {
  padding: 8px 12px; border-radius: 8px; font-size: 12px; font-weight: 600;
  text-align: center; background: #141414; border: 1px solid #222; color: #666; transition: all 0.2s;
}
#status-pill.ok      { background: #041a0e; border-color: #15803d; color: #4ade80; }
#status-pill.bad     { background: #1a0404; border-color: #991b1b; color: #fca5a5; }
#status-pill.win     { background: #0d0d2e; border-color: #6366f1; color: #a5b4fc; }
#status-pill.holding { background: #3a0f00; border-color: #f97316; color: #fdba74; }

.bar-row { display: flex; align-items: center; gap: 8px; }
.bar-label { font-size: 11px; color: #333; min-width: 46px; }
.bar-bg { flex: 1; height: 4px; background: #1a1a1a; border-radius: 99px; overflow: hidden; }
.bar-fill { height: 100%; width: 0%; border-radius: 99px; transition: width 0.1s; }
#conf-fill { background: #15803d; }
#hold-fill { background: #f97316; transition: width 0.07s; }
#conf-pct  { font-size: 10px; color: #333; min-width: 28px; text-align: right; }

#debug { font-size: 10px; color: #1e1e1e; text-align: center; min-height: 14px; }

#start-area { text-align: center; padding: 8px 0; }
#start-btn {
  padding: 10px 26px; border-radius: 8px; border: 1px solid #f97316;
  background: #3a0f00; color: #fdba74; font-size: 13px; font-weight: 600; cursor: pointer;
}
#start-btn:hover { background: #4d1500; }
#start-btn:disabled { opacity: 0.4; cursor: default; }
#reset-btn {
  padding: 6px 14px; border-radius: 7px; border: 1px solid #222;
  background: #141414; color: #555; font-size: 11px; cursor: pointer; width: 100%;
}
#reset-btn:hover { background: #1a1a1a; }

/* Jutsu name flash overlay on camera */
#jutsu-flash {
  position: absolute; inset: 0; display: none;
  align-items: center; justify-content: center;
  pointer-events: none; z-index: 10;
}
#jutsu-flash-text {
  font-size: 32px; font-weight: 900; color: white;
  text-shadow: 0 0 20px #f97316, 0 0 40px #f97316;
  letter-spacing: 0.06em; opacity: 0;
  animation: none;
}
@keyframes jutsuFlash {
  0%   { opacity: 0; transform: scale(0.7); }
  20%  { opacity: 1; transform: scale(1.08); }
  70%  { opacity: 1; transform: scale(1.0); }
  100% { opacity: 0; transform: scale(1.05); }
}
</style>
</head>
<body>

<div id="loading-screen">
  <div class="spinner"></div>
  <h1>Loading...</h1>
  <p>Downloading MediaPipe hand model (~8 MB)</p>
</div>

<div id="app">
  <header>
    <h1>Naruto Hand Sign Challenge</h1>
    <p>Watch the animated seal · replicate it · complete the sequence to trigger the jutsu on your camera</p>
  </header>
  <div id="jutsu-row"></div>
  <div id="main">
    <div id="cam-wrap">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
      <div id="jutsu-flash"><span id="jutsu-flash-text"></span></div>
    </div>
    <div id="panel">
      <div class="card" id="seal-ref"><div class="idle">Select a jutsu to begin</div></div>
      <div class="card" style="display:flex;flex-direction:column;gap:7px">
        <div style="font-size:10px;color:#333">Sequence</div>
        <div class="progress-seals" id="progress-seals"></div>
      </div>
      <div id="status-pill">Waiting for camera...</div>
      <div class="card" style="display:flex;flex-direction:column;gap:7px">
        <div class="bar-row">
          <span class="bar-label">Gesture</span>
          <div class="bar-bg"><div class="bar-fill" id="conf-fill"></div></div>
          <span id="conf-pct">0%</span>
        </div>
        <div class="bar-row">
          <span class="bar-label">Hold</span>
          <div class="bar-bg"><div class="bar-fill" id="hold-fill"></div></div>
        </div>
      </div>
      <div id="start-area"><button id="start-btn" onclick="startCamera()">Enable camera</button></div>
      <button id="reset-btn" onclick="resetJutsu()">Reset</button>
      <div id="debug"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1640029074/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1620248257/drawing_utils.js"></script>

// ── Gesture detection ─────────────────────────────────────────────────────────
function fingerUp(lm,tip,pip){ return lm[tip].y < lm[pip].y - 0.06; }
function fingerCurled(lm,tip,mcp){ return lm[tip].y > lm[mcp].y - 0.03; }
function thumbSpread(lm){ return Math.abs(lm[4].x - lm[5].x) > 0.09; }
function thumbTucked(lm){ return !thumbSpread(lm) && lm[4].y > lm[5].y - 0.04; }

const iIdx=lm=>fingerUp(lm,8,6),   iMid=lm=>fingerUp(lm,12,10);
const iRing=lm=>fingerUp(lm,16,14),iPink=lm=>fingerUp(lm,20,18);
const cIdx=lm=>fingerCurled(lm,8,5), cMid=lm=>fingerCurled(lm,12,9);
const cRing=lm=>fingerCurled(lm,16,13),cPink=lm=>fingerCurled(lm,20,17);
const allUp=lm=>iIdx(lm)&&iMid(lm)&&iRing(lm)&&iPink(lm);
const allCurl=lm=>cIdx(lm)&&cMid(lm)&&cRing(lm)&&cPink(lm);

// Boar: single-hand closed fist with thumb tucked.
// The "both hands knuckle-to-knuckle" intent is hard to detect with one hand;
// we just require a clean fist — this is reliable and matches what you'll actually do.
const GESTURES = {
  snake:  lm=>allUp(lm)&&thumbSpread(lm),
  hare:   lm=>iIdx(lm)&&iMid(lm)&&iRing(lm)&&cPink(lm),
  dog:    lm=>iIdx(lm)&&!iMid(lm)&&!iRing(lm)&&iPink(lm),
  tiger:  lm=>iIdx(lm)&&!iMid(lm)&&!iRing(lm)&&!iPink(lm)&&thumbSpread(lm),
  ox:     lm=>iIdx(lm)&&iMid(lm)&&cRing(lm)&&cPink(lm)&&thumbTucked(lm),
  ram:    lm=>iIdx(lm)&&iMid(lm)&&cRing(lm)&&cPink(lm),
  bird:   lm=>!iIdx(lm)&&iMid(lm)&&!iRing(lm)&&!iPink(lm),
  monkey: lm=>cIdx(lm)&&cMid(lm)&&cRing(lm)&&iPink(lm),
  rat:    lm=>allCurl(lm)&&thumbSpread(lm),
  // boar and horse both = fist. Separate them by context (horse = fingers close first,
  // boar = already a fist). In practice they're the same landmark pattern — we accept either.
  boar:   lm=>allCurl(lm)&&thumbTucked(lm),
  horse:  lm=>allCurl(lm)&&thumbTucked(lm),
};
const GESTURE_ORDER=['snake','hare','dog','tiger','ox','ram','bird','monkey','rat','boar','horse'];

function detectGesture(lm){
  for(const id of GESTURE_ORDER){
    try{ if(GESTURES[id](lm)) return id; }catch(e){}
  }
  return null;
}

// ── AR Effect Engine ──────────────────────────────────────────────────────────
let effectActive=false, effectType=null, effectStart=0;
const EFFECT_DUR=5000;
let particles=[], lastLM=null;

function startEffect(type, lm){
  effectActive=true; effectType=type; effectStart=Date.now(); particles=[];
  if(type==='rasengan') initRasengan();
  if(type==='chidori')  initChidori();
  if(type==='fireball') initFireball();
  if(type==='shadow')   initShadow();
  if(type==='water')    initWater();
}

function palmXY(lm, cw, ch){
  // mirrored canvas (scaleX(-1)), so flip x
  return { x:(1-((lm[0].x+lm[9].x)/2))*cw, y:((lm[0].y+lm[9].y)/2)*ch };
}

// RASENGAN ────────────────────────────────────────────────────────────────────
function initRasengan(){
  for(let i=0;i<220;i++) particles.push({
    angle: Math.random()*Math.PI*2,
    speed: (0.05+Math.random()*0.09)*(Math.random()<0.5?1:-0.7),
    r:     8+Math.random()*50,
    size:  1.5+Math.random()*3.5,
    alpha: 0.5+Math.random()*0.5,
    col:   Math.random()<0.55 ? [180,230,255] : [255,255,255],
  });
}
function drawRasengan(ctx,lm,t,cw,ch){
  const {x:cx,y:cy}=palmXY(lm,cw,ch);
  const grow=Math.min(1,t*2.2);
  const R=65*grow;
  // outer glow halos
  for(let g=4;g>=1;g--){
    const gr=ctx.createRadialGradient(cx,cy,0,cx,cy,R*g*0.55);
    gr.addColorStop(0,`rgba(100,200,255,${0.08/g})`);
    gr.addColorStop(1,'rgba(0,50,200,0)');
    ctx.beginPath(); ctx.arc(cx,cy,R*g*0.55,0,Math.PI*2); ctx.fillStyle=gr; ctx.fill();
  }
  // core gradient orb
  const cg=ctx.createRadialGradient(cx,cy,0,cx,cy,R);
  cg.addColorStop(0,'rgba(255,255,255,0.97)');
  cg.addColorStop(0.28,'rgba(200,240,255,0.85)');
  cg.addColorStop(0.65,'rgba(60,160,255,0.55)');
  cg.addColorStop(1,'rgba(0,80,255,0)');
  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.fillStyle=cg; ctx.fill();
  // spinning particle streaks
  const spin=t*5;
  for(const p of particles){
    const a=p.angle+spin*p.speed;
    const pr=p.r*grow;
    const px2=cx+Math.cos(a)*pr, py2=cy+Math.sin(a)*pr*0.6;
    const sz=p.size*grow;
    ctx.beginPath(); ctx.arc(px2,py2,sz,0,Math.PI*2);
    ctx.fillStyle=`rgba(${p.col[0]},${p.col[1]},${p.col[2]},${p.alpha*grow})`;
    ctx.fill();
  }
  // inner flash on entry
  if(t<0.18){
    const f=(0.18-t)/0.18;
    ctx.beginPath(); ctx.arc(cx,cy,R*0.5,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${f*0.9})`; ctx.fill();
  }
}

// CHIDORI ─────────────────────────────────────────────────────────────────────
function initChidori(){ particles=[]; }
function bolt(ctx,x0,y0,x1,y1,rough,minL){
  const dx=x1-x0,dy=y1-y0,L=Math.sqrt(dx*dx+dy*dy);
  if(L<minL){ctx.moveTo(x0,y0);ctx.lineTo(x1,y1);return;}
  const mx=(x0+x1)/2+(Math.random()-0.5)*rough*L;
  const my=(y0+y1)/2+(Math.random()-0.5)*rough*L;
  bolt(ctx,x0,y0,mx,my,rough*0.85,minL);
  bolt(ctx,mx,my,x1,y1,rough*0.85,minL);
  if(Math.random()<0.25){
    bolt(ctx,mx,my,mx+(Math.random()-0.5)*55,my-Math.random()*55,rough*0.65,minL*2);
  }
}
function drawChidori(ctx,lm,t,cw,ch){
  const {x:cx,y:cy}=palmXY(lm,cw,ch);
  const I=Math.min(1,t*2.5);
  // glow
  const gg=ctx.createRadialGradient(cx,cy,0,cx,cy,70*I);
  gg.addColorStop(0,`rgba(200,230,255,${0.75*I})`);
  gg.addColorStop(0.5,`rgba(80,170,255,${0.4*I})`);
  gg.addColorStop(1,'rgba(0,80,255,0)');
  ctx.beginPath(); ctx.arc(cx,cy,70*I,0,Math.PI*2); ctx.fillStyle=gg; ctx.fill();
  // flickering bolts — redraw every frame for crackle
  const numBolts=7;
  for(let b=0;b<numBolts;b++){
    const ang=(b/numBolts)*Math.PI*2+t*1.2+Math.random()*0.3;
    const bLen=(55+Math.random()*50)*I;
    const x1=cx+Math.cos(ang)*bLen, y1=cy+Math.sin(ang)*bLen;
    // thick blue outer
    ctx.beginPath(); ctx.strokeStyle=`rgba(80,160,255,${0.45*I})`; ctx.lineWidth=4;
    bolt(ctx,cx,cy,x1,y1,0.3,10); ctx.stroke();
    // thin white core
    ctx.beginPath(); ctx.strokeStyle=`rgba(255,255,255,${0.9*I})`; ctx.lineWidth=1.5;
    bolt(ctx,cx,cy,x1,y1,0.25,8); ctx.stroke();
  }
  // bright core dot
  ctx.beginPath(); ctx.arc(cx,cy,16*I,0,Math.PI*2);
  ctx.fillStyle=`rgba(255,255,255,${0.95*I})`; ctx.fill();
  // sparks
  if(Math.random()<0.6){
    for(let s=0;s<4;s++){
      const sa=Math.random()*Math.PI*2, sr=20+Math.random()*45;
      ctx.beginPath(); ctx.arc(cx+Math.cos(sa)*sr,cy+Math.sin(sa)*sr,2,0,Math.PI*2);
      ctx.fillStyle=`rgba(200,230,255,${0.7*I})`; ctx.fill();
    }
  }
}

// FIREBALL ────────────────────────────────────────────────────────────────────
function initFireball(){
  for(let i=0;i<200;i++){
    const ang=Math.random()*Math.PI*2;
    const spd=1.5+Math.random()*3.5;
    particles.push({
      vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd-Math.random()*1.5,
      life:Math.random()*0.6, size:8+Math.random()*22,
      col: Math.random()<0.4?[255,80,10]:Math.random()<0.5?[255,180,30]:[255,240,80],
      alpha:0.7+Math.random()*0.3,
    });
  }
}
function drawFireball(ctx,lm,t,cw,ch){
  // Originate from forehead/top area of frame
  const ox=cw/2, oy=ch*0.18;
  const expand=Math.min(1,t*2.8);
  const R=cw*0.42*expand;
  // expanding ball
  const fg=ctx.createRadialGradient(ox,oy,0,ox,oy,R);
  fg.addColorStop(0,`rgba(255,255,200,${0.95*(1-t*0.8)})`);
  fg.addColorStop(0.25,`rgba(255,160,20,${0.85*(1-t*0.7)})`);
  fg.addColorStop(0.6,`rgba(220,40,0,${0.6*(1-t*0.6)})`);
  fg.addColorStop(1,'rgba(80,0,0,0)');
  ctx.beginPath(); ctx.arc(ox,oy,R,0,Math.PI*2); ctx.fillStyle=fg; ctx.fill();
  // fire particles
  const elapsed=t*EFFECT_DUR;
  for(const p of particles){
    const age=(elapsed*0.001-p.life)/1.5;
    if(age<0||age>1) continue;
    const px2=ox+p.vx*elapsed*0.12;
    const py2=oy+p.vy*elapsed*0.12;
    const a=(1-age)*p.alpha;
    const sz=p.size*(0.4+expand*0.6)*(1-age*0.5);
    ctx.beginPath(); ctx.arc(px2,py2,sz,0,Math.PI*2);
    ctx.fillStyle=`rgba(${p.col[0]},${p.col[1]},${p.col[2]},${a})`;
    ctx.fill();
  }
}

// SHADOW CLONE ────────────────────────────────────────────────────────────────
// Real effect: screen flashes bright white, then splits — ghostly duplicate
// silhouettes appear to left and right of the user, then fade.
function initShadow(){ particles=[]; }

function drawShadow(ctx,lm,t,cw,ch){
  const phase = t; // 0→1 over 5s

  // Phase 1 (0–0.12): bright white flash filling the whole screen
  if(phase < 0.12){
    const f = phase<0.06 ? phase/0.06 : 1-(phase-0.06)/0.06;
    ctx.fillStyle = `rgba(255,255,255,${f*0.92})`;
    ctx.fillRect(0,0,cw,ch);
    return;
  }

  // Phase 2 (0.12–0.5): screen desaturates / goes slightly dark blue like anime energy build
  if(phase < 0.5){
    const f=(phase-0.12)/0.38;
    ctx.fillStyle=`rgba(10,20,60,${f*0.45})`;
    ctx.fillRect(0,0,cw,ch);
    // Blue chakra aura radiating from center
    const aura=ctx.createRadialGradient(cw/2,ch/2,0,cw/2,ch/2,cw*0.65);
    aura.addColorStop(0,'rgba(100,140,255,0)');
    aura.addColorStop(0.5,`rgba(80,120,255,${f*0.25})`);
    aura.addColorStop(1,`rgba(50,80,200,${f*0.35})`);
    ctx.beginPath(); ctx.arc(cw/2,ch/2,cw*0.65,0,Math.PI*2);
    ctx.fillStyle=aura; ctx.fill();
  }

  // Phase 3 (0.35–0.85): TWO ghostly clones appear — one on each side, slightly offset
  if(phase > 0.35 && phase < 0.85){
    const f=phase<0.5?(phase-0.35)/0.15:phase<0.75?1:(0.85-phase)/0.1;
    const cloneAlpha=Math.max(0,f*0.55);
    // We draw semi-transparent white silhouette panels at left and right
    // to simulate two copies of the user appearing
    const offsets=[-cw*0.30, cw*0.30];
    for(const ox2 of offsets){
      ctx.save();
      ctx.globalAlpha=cloneAlpha;
      // Draw a tall ghost oval representing the clone body silhouette
      const gx=cw/2+ox2, gy=ch/2;
      const gw=cw*0.28, gh=ch*0.72;
      const ghostGrad=ctx.createRadialGradient(gx,gy-gh*0.1,0,gx,gy,Math.max(gw,gh)*0.6);
      ghostGrad.addColorStop(0,'rgba(200,220,255,0.9)');
      ghostGrad.addColorStop(0.45,'rgba(160,190,255,0.7)');
      ghostGrad.addColorStop(1,'rgba(80,120,255,0)');
      ctx.beginPath();
      ctx.ellipse(gx,gy,gw,gh,0,0,Math.PI*2);
      ctx.fillStyle=ghostGrad;
      ctx.fill();
      ctx.restore();
    }

    // Particle burst lines radiating out from center (speed lines like anime)
    if(phase > 0.35 && phase < 0.55){
      const lf=(phase-0.35)/0.2;
      ctx.save(); ctx.globalAlpha=lf*0.5;
      for(let i=0;i<24;i++){
        const ang=(i/24)*Math.PI*2;
        const r0=cw*0.05, r1=cw*0.55*lf;
        ctx.beginPath();
        ctx.strokeStyle='rgba(180,200,255,0.6)';
        ctx.lineWidth=1.5;
        ctx.moveTo(cw/2+Math.cos(ang)*r0, ch/2+Math.sin(ang)*r0);
        ctx.lineTo(cw/2+Math.cos(ang)*r1, ch/2+Math.sin(ang)*r1);
        ctx.stroke();
      }
      ctx.restore();
    }
  }

  // Phase 4 (0.5–0.7): Kanji text flash in center
  if(phase>0.5 && phase<0.75){
    const f=phase<0.58?(phase-0.5)/0.08:phase<0.67?1:(0.75-phase)/0.08;
    ctx.save();
    ctx.globalAlpha=f;
    ctx.font=`900 ${Math.floor(ch*0.1)}px serif`;
    ctx.fillStyle='rgba(255,255,255,0.95)';
    ctx.textAlign='center';
    ctx.shadowColor='rgba(100,150,255,0.9)';
    ctx.shadowBlur=30;
    ctx.fillText('影分身の術', cw/2, ch*0.5);
    ctx.restore();
  }

  // Phase 5 (0.75–1.0): everything fades away
  if(phase>0.75){
    const f=(phase-0.75)/0.25;
    ctx.fillStyle=`rgba(0,0,0,${f*0.5})`;
    ctx.fillRect(0,0,cw,ch);
  }
}

// WATER DRAGON ────────────────────────────────────────────────────────────────
function initWater(){
  for(let i=0;i<280;i++) particles.push({
    t:Math.random(), r:25+Math.random()*100,
    speed:0.25+Math.random()*0.5,
    size:2+Math.random()*7,
    alpha:0.35+Math.random()*0.65,
    col:Math.random()<0.55?[60,170,255]:Math.random()<0.5?[180,230,255]:[255,255,255],
    ySpread:(Math.random()-0.5)*0.7,
  });
}
function drawWater(ctx,lm,t,cw,ch){
  const cx2=cw/2, cy2=ch/2;
  const spin=t*3.5; const grow=Math.min(1,t*2);
  for(const p of particles){
    const a=p.t*Math.PI*8+spin*p.speed;
    const r=p.r*grow;
    const px2=cx2+Math.cos(a)*r;
    const py2=cy2+Math.sin(a)*r*0.45+p.ySpread*ch*0.3*grow;
    const pal=p.alpha*grow*Math.abs(Math.sin(p.t*Math.PI));
    ctx.beginPath(); ctx.arc(px2,py2,p.size*grow,0,Math.PI*2);
    ctx.fillStyle=`rgba(${p.col[0]},${p.col[1]},${p.col[2]},${pal})`; ctx.fill();
  }
  // Dragon head glint
  if(t>0.3){
    const ha=spin*0.75;
    const hx=cx2+Math.cos(ha)*110*grow, hy=cy2+Math.sin(ha)*55*grow;
    const hg=ctx.createRadialGradient(hx,hy,0,hx,hy,35);
    hg.addColorStop(0,'rgba(255,255,255,0.95)');
    hg.addColorStop(0.4,'rgba(120,210,255,0.6)');
    hg.addColorStop(1,'rgba(0,100,200,0)');
    ctx.beginPath(); ctx.arc(hx,hy,35,0,Math.PI*2); ctx.fillStyle=hg; ctx.fill();
  }
}

// ── Main AR dispatch ──────────────────────────────────────────────────────────
function drawEffect(ctx,lm,cw,ch){
  if(!effectActive) return;
  const t=Math.min(1,(Date.now()-effectStart)/EFFECT_DUR);
  if(t>=1){ effectActive=false; return; }
  const useLM=lm||lastLM;
  switch(effectType){
    case 'rasengan':  if(useLM) drawRasengan(ctx,useLM,t,cw,ch); break;
    case 'chidori':   if(useLM) drawChidori(ctx,useLM,t,cw,ch);  break;
    case 'fireball':  drawFireball(ctx,useLM,t,cw,ch);             break;
    case 'shadow':    drawShadow(ctx,useLM,t,cw,ch);               break;
    case 'water':     drawWater(ctx,useLM,t,cw,ch);                break;
  }
}

// ── Game state ────────────────────────────────────────────────────────────────
let currentJutsu=null, currentStep=0;
let holdTarget=null, holdStart=0;
const HOLD_MS=950;

function setStatus(msg,cls){
  const el=document.getElementById('status-pill');
  el.textContent=msg; el.className=cls||''; el.id='status-pill';
}
function setConf(v){
  document.getElementById('conf-fill').style.width=(v*100)+'%';
  document.getElementById('conf-pct').textContent=Math.round(v*100)+'%';
}
function setHold(v){ document.getElementById('hold-fill').style.width=(v*100)+'%'; }

function renderSealRef(){
  const el=document.getElementById('seal-ref');
  if(!currentJutsu){ el.innerHTML='<div class="idle">Select a jutsu to begin</div>'; return; }
  if(currentStep>=currentJutsu.seals.length) return;
  const s=currentJutsu.seals[currentStep];
  const gif=SEAL_GIFS[s.id]; const hint=SEAL_HINTS[s.id]||'';
  el.innerHTML=`
    <div class="step-label">Seal ${currentStep+1} / ${currentJutsu.seals.length}</div>
    <div class="seal-name">${s.label}</div>
    ${gif?`<img src="${gif}" width="230" alt="${s.label}">` : ''}
    <div class="seal-hint">${hint}</div>`;
}
function renderProgress(){
  const el=document.getElementById('progress-seals');
  if(!currentJutsu){ el.innerHTML=''; return; }
  el.innerHTML=currentJutsu.seals.map((s,i)=>{
    const cls=i<currentStep?'ps done':i===currentStep?'ps active':'ps';
    return `<div class="${cls}">${s.label.slice(0,3)}</div>`;
  }).join('');
}
function buildJutsuButtons(){
  const row=document.getElementById('jutsu-row');
  JUTSU.forEach(j=>{
    const b=document.createElement('button');
    b.className='jbtn'; b.id='jbtn-'+j.id; b.textContent=j.name;
    b.onclick=()=>selectJutsu(j.id); row.appendChild(b);
  });
}
function selectJutsu(id){
  currentJutsu=JUTSU.find(j=>j.id===id);
  currentStep=0; holdTarget=null; holdStart=0; effectActive=false;
  document.querySelectorAll('.jbtn').forEach(b=>b.classList.remove('active'));
  document.getElementById('jbtn-'+id).classList.add('active');
  setHold(0); setConf(0);
  renderSealRef(); renderProgress();
  setStatus('Match the hand shape shown on the right','');
}
function resetJutsu(){
  if(!currentJutsu) return;
  currentStep=0; holdTarget=null; holdStart=0; effectActive=false;
  setHold(0); setConf(0);
  renderSealRef(); renderProgress();
  setStatus('Reset!','');
}
function advanceSeal(){
  currentStep++; holdTarget=null; holdStart=0; setHold(0); renderProgress();
  if(currentStep>=currentJutsu.seals.length){ activateJutsu(); }
  else { renderSealRef(); setStatus(`Done! Next: ${currentJutsu.seals[currentStep].label}`,'ok'); }
}
function activateJutsu(){
  setStatus('JUTSU! Watch your camera!','win');
  startEffect(currentJutsu.effect, lastLM);
  // Flash kanji name
  const fl=document.getElementById('jutsu-flash');
  const ft=document.getElementById('jutsu-flash-text');
  ft.textContent=currentJutsu.flashText;
  fl.style.display='flex';
  ft.style.animation='none';
  void ft.offsetWidth;
  ft.style.animation='jutsuFlash 1.8s ease forwards';
  setTimeout(()=>{ fl.style.display='none'; }, 1900);
  document.getElementById('seal-ref').innerHTML=
    `<div style="font-size:12px;color:#f97316;font-weight:700;padding:14px 0;line-height:1.7">
       ${currentJutsu.flashText}<br>
       <span style="font-size:10px;color:#555;font-weight:400">Jutsu active — keep your hand in frame!</span>
     </div>`;
}

// ── Camera + MediaPipe ────────────────────────────────────────────────────────
async function startCamera(){
  const btn=document.getElementById('start-btn');
  btn.textContent='Starting...'; btn.disabled=true;
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:640,height:480}});
    const vid=document.getElementById('video');
    vid.srcObject=stream;
    await new Promise(r=>vid.onloadedmetadata=r);
    await vid.play();
    const ov=document.getElementById('overlay');
    ov.width=vid.videoWidth||640; ov.height=vid.videoHeight||480;
    document.getElementById('start-area').style.display='none';
    setStatus('Camera on — pick a jutsu!','ok');
    initMediaPipe(vid,ov);
  }catch(e){
    setStatus('Camera error: '+e.message,'bad');
    btn.textContent='Retry'; btn.disabled=false;
  }
}

function initMediaPipe(vid,ov){
  const ctx=ov.getContext('2d');
  const cw=ov.width, ch=ov.height;
  const hands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}`});
  hands.setOptions({maxNumHands:2,modelComplexity:1,minDetectionConfidence:0.72,minTrackingConfidence:0.65});

  hands.onResults(results=>{
    ctx.clearRect(0,0,cw,ch);
    const lm=results.multiHandLandmarks?.[0]||null;
    if(lm) lastLM=lm;
    if(results.multiHandLandmarks){
      for(const lmk of results.multiHandLandmarks){
        drawConnectors(ctx,lmk,HAND_CONNECTIONS,{color:'rgba(249,115,22,0.65)',lineWidth:2});
        drawLandmarks(ctx,lmk,{color:'rgba(253,186,116,0.85)',lineWidth:1,radius:3});
      }
    }
    // AR effect always drawn on top
    drawEffect(ctx,lm,cw,ch);

    if(effectActive) return; // don't run game logic while effect is playing

    if(!lm){
      setConf(0); setHold(0); holdTarget=null;
      if(currentJutsu&&currentStep<currentJutsu.seals.length)
        setStatus('No hand — show your hand in frame','bad');
      document.getElementById('debug').textContent='No hand';
      return;
    }
    const gestId=detectGesture(lm);
    const ts=(Math.abs(lm[4].x-lm[5].x)).toFixed(3);
    document.getElementById('debug').textContent=gestId?`${gestId} | spread:${ts}`:`– | spread:${ts}`;
    setConf(gestId?0.9:0.05);

    if(!currentJutsu||currentStep>=currentJutsu.seals.length) return;
    const targetId=currentJutsu.seals[currentStep].id;
    if(gestId===targetId){
      const now=Date.now();
      if(holdTarget!==targetId){holdTarget=targetId;holdStart=now;}
      const prog=Math.min(1,(now-holdStart)/HOLD_MS);
      setHold(prog);
      setStatus(`Holding ${currentJutsu.seals[currentStep].label}...`,'holding');
      if(prog>=1) advanceSeal();
    }else{
      if(holdTarget===targetId){holdTarget=null;setHold(0);}
      setStatus(gestId?`Got "${gestId}" — need "${currentJutsu.seals[currentStep].label}"`:`Form: ${currentJutsu.seals[currentStep].label}`,'');
    }
  });

  const camera=new Camera(vid,{onFrame:async()=>{await hands.send({image:vid});},width:640,height:480});
  camera.start();
}

window.addEventListener('load',()=>{
  const check=setInterval(()=>{
    if(typeof Hands!=='undefined'&&typeof Camera!=='undefined'&&typeof drawConnectors!=='undefined'){
      clearInterval(check);
      document.getElementById('loading-screen').style.display='none';
      document.getElementById('app').style.display='flex';
      buildJutsuButtons();
    }
  },200);
  setTimeout(()=>{
    if(typeof Hands==='undefined')
      document.querySelector('#loading-screen p').textContent='Still loading — check your internet connection';
  },9000);
});
</script>
