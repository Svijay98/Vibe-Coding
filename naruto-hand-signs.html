<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shinobi Academy — Jutsu Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg0:#080608; --bg1:#0e0b10; --bg2:#151118; --bg3:#1c1622;
  --border:#2a2030; --border2:#3d2f50;
  --orange:#f97316; --orange2:#fb923c; --orange-dim:rgba(249,115,22,0.12);
  --gold:#fbbf24; --blue:#60a5fa; --purple:#a78bfa; --green:#34d399; --red:#f87171;
  --text:#e8e0f0; --text2:#9080a8; --text3:#5a4870;
  --glow:0 0 20px rgba(249,115,22,0.35); --glow2:0 0 40px rgba(249,115,22,0.18);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'Rajdhani',sans-serif;background:var(--bg0);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(249,115,22,0.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(249,115,22,0.025) 1px,transparent 1px);
  background-size:48px 48px;pointer-events:none;z-index:0;}

#loading-screen{position:fixed;inset:0;background:var(--bg0);display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:1000;gap:18px;}
.load-logo{font-family:'Cinzel',serif;font-size:26px;color:var(--orange);letter-spacing:.12em;}
.load-sub{font-size:12px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;}
.load-bar-bg{width:240px;height:3px;background:var(--bg3);border-radius:99px;overflow:hidden;}
.load-bar{height:100%;width:0%;background:var(--orange);animation:loadFill 3.5s ease forwards;border-radius:99px;}
@keyframes loadFill{to{width:100%;}}

#app{display:none;flex-direction:column;min-height:100vh;position:relative;z-index:1;}

nav{display:flex;align-items:center;justify-content:space-between;padding:13px 26px;
  border-bottom:1px solid var(--border);background:rgba(8,6,8,0.92);
  backdrop-filter:blur(12px);position:sticky;top:0;z-index:50;}
.nav-logo{font-family:'Cinzel',serif;font-size:17px;color:var(--orange);letter-spacing:.1em;
  display:flex;align-items:center;gap:10px;}
.nav-kanji{width:30px;height:30px;border:1.5px solid var(--orange);color:var(--orange);
  border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;}
.nav-badge{font-size:10px;font-weight:700;padding:3px 9px;background:var(--orange-dim);
  border:1px solid var(--orange);color:var(--orange);border-radius:4px;letter-spacing:.06em;}

#main-layout{display:flex;gap:16px;flex:1;max-width:1380px;margin:0 auto;
  width:100%;padding:18px;align-items:flex-start;}

/* Camera */
#cam-section{flex-shrink:0;display:flex;flex-direction:column;gap:10px;}
#cam-wrap{position:relative;border-radius:16px;overflow:hidden;
  border:1px solid var(--border2);box-shadow:0 0 0 1px var(--border),var(--glow2);width:640px;}
#cam-wrap video{display:block;width:640px;height:auto;}
#cam-wrap canvas{position:absolute;top:0;left:0;width:100%;height:100%;}
#video{transform:scaleX(-1);}
#overlay{transform:scaleX(-1);}

/* Clone canvas — raw video pixels, NOT mirrored, for clone compositing */
#clone-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}

#jutsu-flash{position:absolute;inset:0;display:none;align-items:center;justify-content:center;pointer-events:none;z-index:20;}
#jutsu-flash-text{font-family:'Cinzel',serif;font-size:36px;font-weight:900;color:#fff;letter-spacing:.06em;
  text-shadow:0 0 30px var(--orange),0 0 60px var(--orange);opacity:0;}
@keyframes jutsuBoom{
  0%{opacity:0;transform:scale(0.5)translateY(20px);}
  15%{opacity:1;transform:scale(1.1)translateY(0);}
  70%{opacity:1;transform:scale(1);}
  100%{opacity:0;transform:scale(1.05);}
}

#cam-status{display:flex;align-items:center;justify-content:space-between;
  padding:9px 13px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;}
.sdot{width:8px;height:8px;border-radius:50%;background:#333;display:inline-block;margin-right:7px;}
.sdot.on{background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite;}
.sdot.warn{background:var(--orange);box-shadow:0 0 8px var(--orange);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
#status-text{font-size:13px;font-weight:600;color:var(--text2);letter-spacing:.04em;}
#debug-text{font-size:11px;color:var(--text3);}

/* Right panel */
#right-panel{flex:1;display:flex;flex-direction:column;gap:12px;min-width:0;}

#jutsu-selector-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px;}
#jutsu-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.jcard{padding:10px 12px;border-radius:10px;border:1px solid var(--border);
  background:var(--bg2);cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:10px;}
.jcard:hover{border-color:var(--border2);background:var(--bg3);}
.jcard.active{border-color:var(--orange);background:var(--orange-dim);box-shadow:var(--glow2);}
.jcard-icon{font-size:20px;flex-shrink:0;}
.jcard-name{font-size:13px;font-weight:700;letter-spacing:.04em;}
.jcard-rank{font-size:10px;color:var(--text3);margin-top:1px;}

#seal-panel{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;
  padding:15px;display:flex;flex-direction:column;align-items:center;gap:9px;}
#seal-step{font-size:10px;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;align-self:flex-start;}
#seal-name{font-family:'Cinzel',serif;font-size:21px;color:var(--gold);align-self:flex-start;display:none;}
#seal-img-wrap{width:100%;display:flex;align-items:center;justify-content:center;
  background:var(--bg1);border-radius:10px;padding:10px;border:1px solid var(--border);min-height:155px;}
#seal-img-wrap img{max-width:100%;height:auto;display:block;}
#seal-hint{font-size:12px;color:var(--text2);line-height:1.6;align-self:flex-start;
  padding:8px 10px;background:var(--bg3);border-radius:8px;width:100%;
  border-left:2px solid var(--orange);display:none;}
.idle-msg{font-size:13px;color:var(--text3);text-align:center;padding:28px 0;}

#seq-panel{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:11px;}
#seq-label{font-size:10px;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:7px;}
#seq-pills{display:flex;gap:5px;flex-wrap:wrap;}
.spill{padding:4px 9px;border-radius:5px;font-size:11px;font-weight:700;
  border:1px solid var(--border);background:var(--bg1);color:var(--text3);transition:all .2s;}
.spill.done{background:#041f12;border-color:var(--green);color:var(--green);}
.spill.active{background:var(--orange-dim);border-color:var(--orange);color:var(--orange);box-shadow:0 0 8px rgba(249,115,22,.2);}

#hold-panel{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:11px;display:flex;flex-direction:column;gap:8px;}
.mrow{display:flex;align-items:center;gap:8px;}
.mlabel{font-size:11px;font-weight:700;color:var(--text3);min-width:56px;letter-spacing:.04em;text-transform:uppercase;}
.mbg{flex:1;height:5px;background:var(--bg0);border-radius:99px;overflow:hidden;border:1px solid var(--border);}
.mfill{height:100%;width:0%;border-radius:99px;transition:width .09s;}
#conf-fill{background:var(--green);}
#hold-fill{background:var(--orange);box-shadow:0 0 6px rgba(249,115,22,.5);transition:width .07s;}
#conf-pct{font-size:11px;color:var(--text3);min-width:28px;text-align:right;font-weight:600;}

#win-banner{display:none;padding:14px;border-radius:12px;
  background:linear-gradient(135deg,rgba(167,139,250,.1),rgba(249,115,22,.1));
  border:1px solid var(--purple);text-align:center;}
#win-banner .wt{font-family:'Cinzel',serif;font-size:17px;color:var(--gold);margin-bottom:4px;}
#win-banner .ws{font-size:12px;color:var(--purple);}

#actions{display:flex;gap:8px;}
#start-btn{flex:1;padding:11px;border-radius:10px;border:1px solid var(--orange);
  background:rgba(249,115,22,.1);color:var(--orange);font-family:'Rajdhani',sans-serif;
  font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.06em;text-transform:uppercase;transition:all .15s;}
#start-btn:hover{background:rgba(249,115,22,.2);box-shadow:var(--glow);}
#start-btn:disabled{opacity:.4;cursor:default;}
#reset-btn{padding:11px 18px;border-radius:10px;border:1px solid var(--border2);
  background:var(--bg2);color:var(--text2);font-family:'Rajdhani',sans-serif;
  font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;}
#reset-btn:hover{background:var(--bg3);}
</style>
</head>
<body>
<div id="loading-screen">
  <div class="nav-kanji" style="width:50px;height:50px;font-size:22px;font-family:'Cinzel',serif">忍</div>
  <div class="load-logo">SHINOBI ACADEMY</div>
  <div class="load-sub">Loading MediaPipe · Hand Tracking</div>
  <div class="load-bar-bg"><div class="load-bar"></div></div>
</div>

<div id="app">
  <nav>
    <div class="nav-logo">
      <div class="nav-kanji">忍</div>
      SHINOBI ACADEMY
    </div>
    <div class="nav-badge">JUTSU TRAINER v2</div>
  </nav>
  <div id="main-layout">
    <div id="cam-section">
      <div id="cam-wrap">
        <video id="video" autoplay playsinline muted></video>
        <!-- Layer order: clone canvas (bottom) → overlay (skeleton+AR) → flash (top) -->
        <canvas id="clone-canvas"></canvas>
        <canvas id="overlay"></canvas>
        <div id="jutsu-flash"><span id="jutsu-flash-text"></span></div>
      </div>
      <div id="cam-status">
        <div style="display:flex;align-items:center">
          <span class="sdot" id="sdot"></span>
          <span id="status-text">Camera offline</span>
        </div>
        <span id="debug-text"></span>
      </div>
    </div>
    <div id="right-panel">
      <div>
        <div id="jutsu-selector-label">Select Jutsu</div>
        <div id="jutsu-grid"></div>
      </div>
      <div id="seal-panel">
        <div id="seal-step">Select a jutsu</div>
        <div id="seal-name"></div>
        <div id="seal-img-wrap"><div class="idle-msg">Pick a jutsu to begin training</div></div>
        <div id="seal-hint"></div>
      </div>
      <div id="seq-panel">
        <div id="seq-label">Sequence</div>
        <div id="seq-pills"></div>
      </div>
      <div id="hold-panel">
        <div class="mrow">
          <span class="mlabel">Gesture</span>
          <div class="mbg"><div class="mfill" id="conf-fill"></div></div>
          <span id="conf-pct">0%</span>
        </div>
        <div class="mrow">
          <span class="mlabel">Hold</span>
          <div class="mbg"><div class="mfill" id="hold-fill"></div></div>
        </div>
      </div>
      <div id="win-banner"><div class="wt" id="win-name"></div><div class="ws" id="win-desc"></div></div>
      <div id="actions">
        <button id="start-btn" onclick="startCamera()">⚡ Enable Camera</button>
        <button id="reset-btn" onclick="resetJutsu()">↺ Reset</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js"></script>

  ox:    {label:'Ox',    hint:'Index + middle fingers UP. Thumb pressed firmly INWARD against palm side.'},
  tiger: {label:'Tiger', hint:'Index finger pointing UP. Thumb extended OUT to the side (L-shape).'},
  hare:  {label:'Hare',  hint:'Index + middle + ring fingers UP. Pinky curled down. Thumb tucked in.'},
  dragon:{label:'Dragon',hint:'All four fingers pointing UP. Thumb tucked across the palm.'},
  snake: {label:'Snake', hint:'Both palms fully OPEN. All five fingers spread wide. Thumbs out.'},
  horse: {label:'Horse', hint:'Tight closed fist. ALL fingers curled in. Thumb also tucked in.'},
  ram:   {label:'Ram',   hint:'Peace sign: index + middle UP only. Ring, pinky AND thumb all tucked IN.'},
  monkey:{label:'Monkey',hint:'Only the PINKY extended up. All other fingers curled. Thumb pointing out.'},
  bird:  {label:'Bird',  hint:'Only the MIDDLE finger pointing straight up. All others curled tight.'},
  dog:   {label:'Dog',   hint:'Index + pinky UP (devil horns shape). Middle and ring fingers curled down.'},

// ── FIXED Gesture Detection ───────────────────────────────────────────────────
// Key fixes:
// 1. Ram vs Ox: Ram does NOT check thumb at all (fires freely). Ox requires thumb clearly tucked.
//    They can't truly be distinguished reliably, so we make Ram the "easy" one.
// 2. Boar vs Horse: Boar fires from either hand since "both hands together" can't be detected
//    with a single hand tracker — just require a clean fist.
// 3. All checks use PIP (middle joint) not MCP for fingerUp — more reliable.

const up   = (lm,t,p) => lm[t].y < lm[p].y - 0.055;
const curl = (lm,t,m) => lm[t].y > lm[m].y - 0.028;
// Thumb spread: distance between thumb tip and index finger MCP
const tOut = lm => Math.abs(lm[4].x - lm[5].x) > 0.085;
const tIn  = lm => Math.abs(lm[4].x - lm[5].x) < 0.07 && lm[4].y > lm[5].y - 0.035;

const iI=lm=>up(lm,8,6),   iM=lm=>up(lm,12,10);
const iR=lm=>up(lm,16,14), iP=lm=>up(lm,20,18);
const cI=lm=>curl(lm,8,5), cM=lm=>curl(lm,12,9);
const cR=lm=>curl(lm,16,13),cP=lm=>curl(lm,20,17);
const allUp=lm=>iI(lm)&&iM(lm)&&iR(lm)&&iP(lm);
const allC =lm=>cI(lm)&&cM(lm)&&cR(lm)&&cP(lm);

// Boar vs Horse separation strategy:
// Both are closed fists — impossible to distinguish by finger position alone.
// Solution: remove both from the auto-detect entirely and use CONTEXT.
// The game tells the detector which one to look for via currentTarget.
// When the target is 'boar', detect fires on any clean fist.
// When the target is 'horse', detect fires on any clean fist.
// This way either seal reliably registers as a fist when that's what's expected.
// We keep them in GESTURES as identical so both work; the sequence context determines which one scores.

const GESTURES={
  snake:  lm=>allUp(lm)&&tOut(lm),
  hare:   lm=>iI(lm)&&iM(lm)&&iR(lm)&&cP(lm),
  dragon: lm=>allUp(lm)&&tIn(lm),
  dog:    lm=>iI(lm)&&!iM(lm)&&!iR(lm)&&iP(lm),
  tiger:  lm=>iI(lm)&&!iM(lm)&&!iR(lm)&&!iP(lm)&&tOut(lm),
  ram:    lm=>iI(lm)&&iM(lm)&&cR(lm)&&cP(lm),
  ox:     lm=>iI(lm)&&iM(lm)&&cR(lm)&&cP(lm)&&tIn(lm),
  bird:   lm=>!iI(lm)&&iM(lm)&&!iR(lm)&&!iP(lm),
  monkey: lm=>cI(lm)&&cM(lm)&&cR(lm)&&iP(lm),
  rat:    lm=>allC(lm)&&tOut(lm),
  fist:   lm=>allC(lm),   // catches both boar AND horse — context decides which
};
const G_ORDER=['snake','hare','dragon','dog','tiger','ram','bird','monkey','rat','fist'];

function detect(lm, targetOverride){
  // If the current target is boar or horse, just check for a fist
  if(targetOverride==='boar'||targetOverride==='horse'){
    return GESTURES.fist(lm) ? targetOverride : null;
  }
  // If current target is ox but ram would fire, suppress ram and require ox explicitly
  if(targetOverride==='ox'){
    return (iI(lm)&&iM(lm)&&cR(lm)&&cP(lm)) ? 'ox' : null;
  }
  for(const id of G_ORDER){ try{if(GESTURES[id](lm))return id;}catch(e){} }
  return null;
}

// ── AR Engine ─────────────────────────────────────────────────────────────────
let effActive=false,effType=null,effStart=0,effParts=[];
let lastLM=null,lastCW=640,lastCH=480;
const EFF_DUR=5500;

// Shadow Clone: frame buffer for cloning the user
let frameBuffer=[];          // rolling ring of ImageData frames
let cloneActive=false;
let cloneCtx=null;
let cloneStart=0;
let videoEl=null;
let vidCapCtx=null;          // offscreen canvas for capturing raw video pixels
let vidCapCanvas=null;

function initFrameCapture(vid,cw,ch){
  videoEl=vid;
  vidCapCanvas=document.createElement('canvas');
  vidCapCanvas.width=cw; vidCapCanvas.height=ch;
  vidCapCtx=vidCapCanvas.getContext('2d');
  cloneCtx=document.getElementById('clone-canvas').getContext('2d');
  // capture frames into buffer continuously
  setInterval(()=>{
    if(!videoEl) return;
    vidCapCtx.drawImage(videoEl,0,0,cw,ch);
    const frame=vidCapCtx.getImageData(0,0,cw,ch);
    frameBuffer.push(frame);
    if(frameBuffer.length>90) frameBuffer.shift(); // keep ~3s at 30fps
  },33);
}

function startEffect(type,lm){
  effActive=true; effType=type; effStart=Date.now(); effParts=[];
  if(type==='rasengan') initRasengan();
  if(type==='chidori')  initChidori();
  if(type==='fireball') initFireball();
  if(type==='shadow')   { cloneActive=true; cloneStart=Date.now(); seedSmoke(lastCW||640, lastCH||480); }
  if(type==='water')    initWater();
}

function palmPos(lm,cw,ch){
  return{x:(1-((lm[0].x+lm[9].x)/2))*cw, y:((lm[0].y+lm[9].y)/2)*ch};
}

// RASENGAN ────────────────────────────────────────────────────────────────────
function initRasengan(){
  for(let i=0;i<280;i++) effParts.push({
    angle:Math.random()*Math.PI*2,
    speed:(0.04+Math.random()*0.1)*(Math.random()<0.5?1:-0.65),
    r:6+Math.random()*55,sz:1.2+Math.random()*3.8,a:0.5+Math.random()*0.5,
    col:Math.random()<0.5?[160,225,255]:Math.random()<0.5?[255,255,255]:[100,180,255],
  });
}
function drawRasengan(ctx,lm,t,cw,ch){
  const{x:cx,y:cy}=palmPos(lm,cw,ch);
  const g=Math.min(1,t*2.5),R=70*g,spin=t*6;
  for(let i=4;i>=1;i--){
    const gr=ctx.createRadialGradient(cx,cy,0,cx,cy,R*i*0.6);
    gr.addColorStop(0,`rgba(80,180,255,${0.07/i})`); gr.addColorStop(1,'rgba(0,40,200,0)');
    ctx.beginPath();ctx.arc(cx,cy,R*i*0.6,0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();
  }
  const cg=ctx.createRadialGradient(cx,cy,0,cx,cy,R);
  cg.addColorStop(0,'rgba(255,255,255,.97)');cg.addColorStop(.25,'rgba(210,245,255,.9)');
  cg.addColorStop(.6,'rgba(60,160,255,.6)');cg.addColorStop(1,'rgba(0,80,255,0)');
  ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fillStyle=cg;ctx.fill();
  for(const p of effParts){
    const a=p.angle+spin*p.speed;
    const px=cx+Math.cos(a)*p.r*g,py=cy+Math.sin(a)*p.r*g*0.55;
    ctx.beginPath();ctx.arc(px,py,p.sz*g,0,Math.PI*2);
    ctx.fillStyle=`rgba(${p.col[0]},${p.col[1]},${p.col[2]},${p.a*g})`;ctx.fill();
  }
  ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);
  ctx.strokeStyle=`rgba(180,230,255,${0.5*g})`;ctx.lineWidth=2;ctx.stroke();
  if(t<0.15){ctx.beginPath();ctx.arc(cx,cy,R*.45,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${(0.15-t)/0.15*.9})`;ctx.fill();}
}

// CHIDORI ─────────────────────────────────────────────────────────────────────
function initChidori(){}
function bolt(ctx,x0,y0,x1,y1,r,ml){
  const dx=x1-x0,dy=y1-y0,L=Math.sqrt(dx*dx+dy*dy);
  if(L<ml){ctx.moveTo(x0,y0);ctx.lineTo(x1,y1);return;}
  const mx=(x0+x1)/2+(Math.random()-.5)*r*L, my=(y0+y1)/2+(Math.random()-.5)*r*L;
  bolt(ctx,x0,y0,mx,my,r*.85,ml); bolt(ctx,mx,my,x1,y1,r*.85,ml);
  if(Math.random()<.28) bolt(ctx,mx,my,mx+(Math.random()-.5)*55,my-Math.random()*55,r*.65,ml*2);
}
function drawChidori(ctx,lm,t,cw,ch){
  const{x:cx,y:cy}=palmPos(lm,cw,ch), I=Math.min(1,t*2.8);
  const ag=ctx.createRadialGradient(cx,cy,0,cx,cy,80*I);
  ag.addColorStop(0,`rgba(190,225,255,${.8*I})`);ag.addColorStop(.4,`rgba(80,160,255,${.45*I})`);ag.addColorStop(1,'rgba(0,60,255,0)');
  ctx.beginPath();ctx.arc(cx,cy,80*I,0,Math.PI*2);ctx.fillStyle=ag;ctx.fill();
  for(let b=0;b<8;b++){
    const ang=(b/8)*Math.PI*2+t*1.5+Math.random()*.4;
    const bl=(50+Math.random()*60)*I;
    const x1=cx+Math.cos(ang)*bl,y1=cy+Math.sin(ang)*bl;
    ctx.beginPath();ctx.strokeStyle=`rgba(100,180,255,${.5*I})`;ctx.lineWidth=4;bolt(ctx,cx,cy,x1,y1,.3,10);ctx.stroke();
    ctx.beginPath();ctx.strokeStyle=`rgba(255,255,255,${.92*I})`;ctx.lineWidth=1.5;bolt(ctx,cx,cy,x1,y1,.25,8);ctx.stroke();
  }
  for(let s=0;s<5;s++){const sa=Math.random()*Math.PI*2,sr=15+Math.random()*50;
    ctx.beginPath();ctx.arc(cx+Math.cos(sa)*sr,cy+Math.sin(sa)*sr,2.5,0,Math.PI*2);
    ctx.fillStyle=`rgba(200,230,255,${.8*I})`;ctx.fill();}
  ctx.beginPath();ctx.arc(cx,cy,18*I,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${.95*I})`;ctx.fill();
}

// FIREBALL ────────────────────────────────────────────────────────────────────
function initFireball(){
  for(let i=0;i<240;i++){
    const ang=Math.random()*Math.PI*2,spd=1.2+Math.random()*4;
    effParts.push({vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-Math.random()*2,born:Math.random()*.4,
      size:6+Math.random()*24,col:Math.random()<.4?[255,70,10]:Math.random()<.5?[255,170,20]:[255,230,60]});
  }
}
function drawFireball(ctx,lm,t,cw,ch){
  const ox=cw/2,oy=ch*.16,grow=Math.min(1,t*3.2),R=cw*.44*grow;
  const fg=ctx.createRadialGradient(ox,oy,0,ox,oy,R);
  fg.addColorStop(0,`rgba(255,255,200,${.95*(1-t*.9)})`);fg.addColorStop(.2,`rgba(255,150,20,${.88*(1-t*.75)})`);
  fg.addColorStop(.55,`rgba(220,35,0,${.65*(1-t*.65)})`);fg.addColorStop(1,'rgba(80,0,0,0)');
  ctx.beginPath();ctx.arc(ox,oy,R,0,Math.PI*2);ctx.fillStyle=fg;ctx.fill();
  ctx.beginPath();ctx.arc(ox,oy,R*1.1,0,Math.PI*2);
  ctx.strokeStyle=`rgba(255,100,0,${.3*grow*(1-t)})`;ctx.lineWidth=3;ctx.stroke();
  const el=t*EFF_DUR;
  for(const p of effParts){
    const age=(el*.001-p.born)/1.4; if(age<0||age>1) continue;
    ctx.beginPath();ctx.arc(ox+p.vx*el*.13,oy+p.vy*el*.13,p.size*(.3+grow*.7)*(1-age*.5),0,Math.PI*2);
    ctx.fillStyle=`rgba(${p.col[0]},${p.col[1]},${p.col[2]},${(1-age)*.85})`;ctx.fill();
  }
}

// SHADOW CLONE — Real pixel cloning with smoke materialisation ────────────────
// Phase 0 (0–0.08):  bright white flash
// Phase 1 (0.08–0.35): smoke clouds burst from clone positions
// Phase 2 (0.20–0.75): clones (real camera pixels) materialise from smoke, fully opaque
// Phase 3 (0.75–0.90): clones hold fully visible alongside original
// Phase 4 (0.90–1.0):  clones dissolve back into smoke and disappear

// Pre-seed smoke particles for LEFT and RIGHT clone positions
let smokeParts=[];
function seedSmoke(cw,ch){
  smokeParts=[];
  for(const dir of [-1,1]){
    const cx=cw/2+dir*cw*0.30;
    const cy=ch*0.5;
    for(let i=0;i<60;i++){
      const ang=Math.random()*Math.PI*2;
      const spd=0.8+Math.random()*2.2;
      smokeParts.push({
        dir, cx, cy,
        x:cx+(Math.random()-0.5)*20, y:cy+(Math.random()-0.5)*20,
        vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd-1.2,
        r:18+Math.random()*38,
        alpha:0.55+Math.random()*0.45,
        decay:0.012+Math.random()*0.018,
        born:Math.random()*0.12,
      });
    }
  }
}

function drawShadowClone(cw,ch){
  if(!cloneActive||!cloneCtx) return;
  const t=Math.min(1,(Date.now()-cloneStart)/EFF_DUR);
  if(t>=1){cloneActive=false;cloneCtx.clearRect(0,0,cw,ch);return;}
  cloneCtx.clearRect(0,0,cw,ch);

  // ── Phase 0: white flash ──────────────────────────────────────────────────
  if(t<0.08){
    const f=t<0.04?t/0.04:1-(t-0.04)/0.04;
    cloneCtx.fillStyle=`rgba(255,255,255,${f*0.95})`;
    cloneCtx.fillRect(0,0,cw,ch);
    return;
  }

  // Grab a frozen frame from ~0.4s before activation for the clone image
  const frozenIdx=Math.max(0,frameBuffer.length-14);
  const frozen=frameBuffer[frozenIdx];

  // ── Phase 1+2+3+4: clones + smoke ────────────────────────────────────────
  const CLONE_OFFSETS=[-cw*0.30, cw*0.30]; // left and right positions

  // How opaque are the clones: ramp in 0.20→0.50, hold 0.50→0.80, ramp out 0.80→0.95
  const cloneAlpha=
    t<0.20?0:
    t<0.50?((t-0.20)/0.30):
    t<0.80?1:
    t<0.95?(1-(t-0.80)/0.15):0;

  if(frozen && cloneAlpha>0){
    vidCapCtx.putImageData(frozen,0,0);
    for(const xOff of CLONE_OFFSETS){
      cloneCtx.save();
      cloneCtx.globalAlpha=cloneAlpha;
      // Clone canvas has no CSS mirror transform applied, so we flip manually
      cloneCtx.translate(cw,0); cloneCtx.scale(-1,1);
      cloneCtx.drawImage(vidCapCanvas, -xOff, 0);
      cloneCtx.restore();
    }
  }

  // ── Smoke particles ───────────────────────────────────────────────────────
  // Active during 0.08–0.55 (spawning smoke) and 0.80–1.0 (dissolve smoke)
  const smokePhase = t<0.08?0 : t<0.55?((t-0.08)/0.47) : t<0.80?1 : (1-(t-0.80)/0.20);

  if(smokePhase>0){
    for(const p of smokeParts){
      const age=smokePhase-p.born;
      if(age<0) continue;
      const decay=Math.min(1,age/0.5);
      const px=p.x+p.vx*age*55;
      const py=p.y+p.vy*age*55;
      const radius=p.r*(0.4+decay*0.8);
      const a=p.alpha*(1-decay*0.85)*smokePhase;
      if(a<=0) continue;

      // white-grey smoke puff
      const sg=cloneCtx.createRadialGradient(px,py,0,px,py,radius);
      sg.addColorStop(0,`rgba(230,240,255,${a})`);
      sg.addColorStop(0.5,`rgba(190,210,240,${a*0.6})`);
      sg.addColorStop(1,'rgba(160,190,220,0)');
      cloneCtx.beginPath();
      cloneCtx.arc(px,py,radius,0,Math.PI*2);
      cloneCtx.fillStyle=sg;
      cloneCtx.fill();
    }
  }

  // ── Speed lines burst (0.08–0.22) ────────────────────────────────────────
  if(t>0.08&&t<0.22){
    const lf=(t-0.08)/0.14;
    cloneCtx.save();cloneCtx.globalAlpha=Math.sin(lf*Math.PI)*0.7;
    for(let i=0;i<32;i++){
      const ang=(i/32)*Math.PI*2;
      cloneCtx.beginPath();
      cloneCtx.strokeStyle='rgba(200,220,255,0.85)';cloneCtx.lineWidth=1.0;
      cloneCtx.moveTo(cw/2+Math.cos(ang)*cw*0.03,ch/2+Math.sin(ang)*ch*0.03);
      cloneCtx.lineTo(cw/2+Math.cos(ang)*cw*0.58*lf,ch/2+Math.sin(ang)*ch*0.58*lf);
      cloneCtx.stroke();
    }
    cloneCtx.restore();
  }

  // ── Vignette: darken edges so original in centre pops ────────────────────
  if(cloneAlpha>0){
    const vg=cloneCtx.createRadialGradient(cw/2,ch/2,cw*0.1,cw/2,ch/2,cw*0.6);
    vg.addColorStop(0,'rgba(0,0,0,0)');
    vg.addColorStop(1,`rgba(0,0,0,${0.30*cloneAlpha})`);
    cloneCtx.fillStyle=vg;
    cloneCtx.fillRect(0,0,cw,ch);
  }
}

// WATER DRAGON ────────────────────────────────────────────────────────────────
function initWater(){
  for(let i=0;i<320;i++) effParts.push({
    t:Math.random(),r:20+Math.random()*110,spd:.2+Math.random()*.55,
    sz:1.5+Math.random()*7,a:.3+Math.random()*.7,ys:(Math.random()-.5)*.65,
    col:Math.random()<.5?[50,160,255]:Math.random()<.5?[170,220,255]:[255,255,255],
  });
}
function drawWater(ctx,lm,t,cw,ch){
  const cx=cw/2,cy=ch/2,spin=t*4,grow=Math.min(1,t*2.2);
  const wg=ctx.createRadialGradient(cx,cy,0,cx,cy,cw*.3*grow);
  wg.addColorStop(0,`rgba(40,140,255,${.15*grow})`);wg.addColorStop(1,'rgba(0,60,200,0)');
  ctx.beginPath();ctx.arc(cx,cy,cw*.3*grow,0,Math.PI*2);ctx.fillStyle=wg;ctx.fill();
  for(const p of effParts){
    const a=p.t*Math.PI*10+spin*p.spd,r=p.r*grow;
    const px=cx+Math.cos(a)*r,py=cy+Math.sin(a)*r*.42+p.ys*ch*.25*grow;
    const pal=p.a*grow*Math.max(0,Math.sin(p.t*Math.PI));
    ctx.beginPath();ctx.arc(px,py,p.sz*grow,0,Math.PI*2);
    ctx.fillStyle=`rgba(${p.col[0]},${p.col[1]},${p.col[2]},${pal})`;ctx.fill();
  }
  if(t>.25){
    const ha=spin*.8,hx=cx+Math.cos(ha)*120*grow,hy=cy+Math.sin(ha)*60*grow;
    const hg=ctx.createRadialGradient(hx,hy,0,hx,hy,40);
    hg.addColorStop(0,'rgba(255,255,255,.97)');hg.addColorStop(.35,'rgba(140,220,255,.7)');hg.addColorStop(1,'rgba(0,100,220,0)');
    ctx.beginPath();ctx.arc(hx,hy,40,0,Math.PI*2);ctx.fillStyle=hg;ctx.fill();
    ctx.beginPath();ctx.arc(hx+8,hy-5,5,0,Math.PI*2);ctx.fillStyle='rgba(255,50,0,.9)';ctx.fill();
  }
}

function drawEffect(ctx,lm,cw,ch){
  if(!effActive) return;
  const t=Math.min(1,(Date.now()-effStart)/EFF_DUR);
  if(t>=1){effActive=false;return;}
  const use=lm||lastLM;
  switch(effType){
    case'rasengan': if(use) drawRasengan(ctx,use,t,cw,ch); break;
    case'chidori':  if(use) drawChidori(ctx,use,t,cw,ch);  break;
    case'fireball': drawFireball(ctx,use,t,cw,ch); break;
    case'water':    drawWater(ctx,use,t,cw,ch);    break;
    // shadow clone is handled separately via clone-canvas
  }
}

// ── Game state ────────────────────────────────────────────────────────────────
let cJ=null,cStep=0,holdT=null,holdS=0;
const HOLD_MS=950;

function setSt(msg,state){
  document.getElementById('status-text').textContent=msg;
  const d=document.getElementById('sdot');
  d.className='sdot'+(state==='on'?' on':state==='warn'?' warn':'');
}
function setConf(v){
  document.getElementById('conf-fill').style.width=(v*100)+'%';
  document.getElementById('conf-pct').textContent=Math.round(v*100)+'%';
}
function setHold(v){document.getElementById('hold-fill').style.width=(v*100)+'%';}

function renderSeal(){
  const sn=document.getElementById('seal-name'),
        sw=document.getElementById('seal-img-wrap'),
        sh=document.getElementById('seal-hint'),
        sl=document.getElementById('seal-step');
  if(!cJ){sn.style.display='none';sh.style.display='none';
    sw.innerHTML='<div class="idle-msg">Pick a jutsu to begin training</div>';
    sl.textContent='Select a jutsu'; return;}
  if(cStep>=cJ.seals.length) return;
  const sId=cJ.seals[cStep],meta=SEAL_META[sId],img=SEAL_IMGS[sId];
  sl.textContent=`Seal ${cStep+1} of ${cJ.seals.length}`;
  sn.style.display='block'; sn.textContent=meta.label;
  sw.innerHTML=img?`<img src="${img}" style="max-width:250px;height:auto" alt="${meta.label}">`
                  :`<div style="color:var(--text3);font-size:13px">${meta.label}</div>`;
  sh.style.display='block'; sh.textContent=meta.hint;
}
function renderSeq(){
  const el=document.getElementById('seq-pills');
  if(!cJ){el.innerHTML='<span style="color:var(--text3);font-size:11px">—</span>';return;}
  el.innerHTML=cJ.seals.map((s,i)=>{
    const cls=i<cStep?'spill done':i===cStep?'spill active':'spill';
    return `<div class="${cls}">${SEAL_META[s]?.label||s}</div>`;
  }).join('');
}
function buildGrid(){
  const g=document.getElementById('jutsu-grid');
  JUTSU.forEach(j=>{
    const c=document.createElement('div');c.className='jcard';c.id='jc-'+j.id;
    c.innerHTML=`<span class="jcard-icon">${j.icon}</span>
      <div><div class="jcard-name">${j.name}</div><div class="jcard-rank">${j.rank} · ${j.seals.length} seals</div></div>`;
    c.onclick=()=>selectJ(j.id);g.appendChild(c);
  });
}
function selectJ(id){
  cJ=JUTSU.find(j=>j.id===id);cStep=0;holdT=null;holdS=0;effActive=false;cloneActive=false;
  document.querySelectorAll('.jcard').forEach(c=>c.classList.remove('active'));
  document.getElementById('jc-'+id).classList.add('active');
  document.getElementById('win-banner').style.display='none';
  if(cloneCtx) cloneCtx.clearRect(0,0,9999,9999);
  setHold(0);setConf(0);renderSeal();renderSeq();
}
function resetJutsu(){
  if(!cJ) return;
  cStep=0;holdT=null;holdS=0;effActive=false;cloneActive=false;
  if(cloneCtx) cloneCtx.clearRect(0,0,9999,9999);
  setHold(0);setConf(0);
  document.getElementById('win-banner').style.display='none';
  renderSeal();renderSeq();setSt('Ready','on');
}
function advanceSeal(){
  cStep++;holdT=null;holdS=0;setHold(0);renderSeq();
  if(cStep>=cJ.seals.length){activateJutsu();}
  else{renderSeal();setSt(`Next: ${SEAL_META[cJ.seals[cStep]]?.label}`,'on');}
}
function activateJutsu(){
  setSt('JUTSU!','warn');
  startEffect(cJ.effect,lastLM);
  const fl=document.getElementById('jutsu-flash'),ft=document.getElementById('jutsu-flash-text');
  ft.textContent=cJ.flash;fl.style.display='flex';
  ft.style.animation='none';void ft.offsetWidth;ft.style.animation='jutsuBoom 2s ease forwards';
  setTimeout(()=>fl.style.display='none',2100);
  document.getElementById('win-banner').style.display='block';
  document.getElementById('win-name').textContent=cJ.icon+' '+cJ.flash;
  document.getElementById('win-desc').textContent=`${cJ.name} activated! Watch the AR effect on your camera.`;
  document.getElementById('seal-step').textContent='Jutsu Active';
  document.getElementById('seal-name').textContent=cJ.flash;
  document.getElementById('seal-img-wrap').innerHTML=`<div style="font-size:54px;padding:20px">${cJ.icon}</div>`;
  document.getElementById('seal-hint').style.display='none';
}

// ── Camera + MediaPipe ────────────────────────────────────────────────────────
async function startCamera(){
  const btn=document.getElementById('start-btn');
  btn.textContent='Starting...';btn.disabled=true;setSt('Requesting...','');
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:640,height:480}});
    const vid=document.getElementById('video');
    vid.srcObject=stream;
    await new Promise(r=>vid.onloadedmetadata=r);
    await vid.play();
    const ov=document.getElementById('overlay');
    const cc=document.getElementById('clone-canvas');
    ov.width=vid.videoWidth||640;ov.height=vid.videoHeight||480;
    cc.width=ov.width;cc.height=ov.height;
    lastCW=ov.width; lastCH=ov.height;
    btn.style.display='none';setSt('Camera active — select a jutsu!','on');
    initFrameCapture(vid,ov.width,ov.height);
    initMediaPipe(vid,ov);
  }catch(e){
    setSt('Camera error: '+e.message,'');btn.textContent='⚡ Enable Camera';btn.disabled=false;
  }
}

function initMediaPipe(vid,ov){
  const ctx=ov.getContext('2d');
  const cw=ov.width,ch=ov.height;
  const hands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}`});
  hands.setOptions({maxNumHands:2,modelComplexity:1,minDetectionConfidence:0.72,minTrackingConfidence:0.65});

  // Shadow clone update loop (separate from MediaPipe to keep smooth)
  setInterval(()=>drawShadowClone(cw,ch),33);

  hands.onResults(res=>{
    ctx.clearRect(0,0,cw,ch);
    const lm=res.multiHandLandmarks?.[0]||null;
    if(lm) lastLM=lm;
    if(res.multiHandLandmarks){
      for(const lmk of res.multiHandLandmarks){
        drawConnectors(ctx,lmk,HAND_CONNECTIONS,{color:'rgba(251,191,36,.65)',lineWidth:2});
        drawLandmarks(ctx,lmk,{color:'rgba(249,115,22,.85)',lineWidth:1,radius:3});
      }
    }
    drawEffect(ctx,lm,cw,ch);
    if(effActive||cloneActive) return;

    if(!lm){
      setConf(0);setHold(0);holdT=null;
      if(cJ&&cStep<cJ.seals.length) setSt('No hand — show your hand in frame','warn');
      document.getElementById('debug-text').textContent='No hand';return;
    }
    const tgt=cJ&&cStep<cJ.seals.length ? cJ.seals[cStep] : null;
    const g=detect(lm, tgt);
    const ts=(Math.abs(lm[4].x-lm[5].x)).toFixed(3);
    document.getElementById('debug-text').textContent=g?`${g} | spread:${ts}`:`— | ${ts}`;
    setConf(g?0.92:0.04);

    if(!cJ||cStep>=cJ.seals.length) return;
    if(g===tgt){
      const now=Date.now();
      if(holdT!==tgt){holdT=tgt;holdS=now;}
      const prog=Math.min(1,(now-holdS)/HOLD_MS);
      setHold(prog);setSt(`Holding ${SEAL_META[tgt]?.label}...`,'on');
      if(prog>=1) advanceSeal();
    }else{
      if(holdT===tgt){holdT=null;setHold(0);}
      setSt(g?`Got "${g}" — need "${SEAL_META[tgt]?.label}"`:`Form: ${SEAL_META[tgt]?.label}`,'');
    }
  });
  const cam=new Camera(vid,{onFrame:async()=>{await hands.send({image:vid});},width:640,height:480});
  cam.start();
}

window.addEventListener('load',()=>{
  const chk=setInterval(()=>{
    if(typeof Hands!=='undefined'&&typeof Camera!=='undefined'&&typeof drawConnectors!=='undefined'){
      clearInterval(chk);
      setTimeout(()=>{
        document.getElementById('loading-screen').style.display='none';
        document.getElementById('app').style.display='flex';
        buildGrid();
      },600);
    }
  },200);
  setTimeout(()=>{
    if(typeof Hands==='undefined')
      document.querySelector('.load-sub').textContent='Slow connection — check internet';
  },9000);
});
</script>
