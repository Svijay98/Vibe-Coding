<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shinobi Academy — Jutsu Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg0: #080608;
  --bg1: #0e0b10;
  --bg2: #151118;
  --bg3: #1c1622;
  --border: #2a2030;
  --border2: #3d2f50;
  --orange: #f97316;
  --orange2: #fb923c;
  --orange-dim: rgba(249,115,22,0.15);
  --gold: #fbbf24;
  --blue: #60a5fa;
  --purple: #a78bfa;
  --green: #34d399;
  --red: #f87171;
  --text: #e8e0f0;
  --text2: #9080a8;
  --text3: #5a4870;
  --glow: 0 0 20px rgba(249,115,22,0.4);
  --glow2: 0 0 40px rgba(249,115,22,0.2);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html,body { height: 100%; }
body {
  font-family: 'Rajdhani', sans-serif;
  background: var(--bg0);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Background grid texture */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(249,115,22,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(249,115,22,0.03) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none; z-index: 0;
}

/* Loading screen */
#loading-screen {
  position: fixed; inset: 0;
  background: var(--bg0);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 1000; gap: 20px;
}
.load-logo { font-family:'Cinzel',serif; font-size:28px; color:var(--orange); letter-spacing:0.12em; }
.load-sub  { font-size:13px; color:var(--text3); letter-spacing:0.08em; text-transform:uppercase; }
.load-bar-bg { width:260px; height:3px; background:var(--bg3); border-radius:99px; overflow:hidden; }
.load-bar    { height:100%; width:0%; background:var(--orange); animation:loadFill 3s ease forwards; border-radius:99px; }
@keyframes loadFill { to { width:100%; } }

/* App shell */
#app { display:none; flex-direction:column; min-height:100vh; position:relative; z-index:1; }

/* Top nav */
nav {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 28px;
  border-bottom:1px solid var(--border);
  background: rgba(8,6,8,0.9);
  backdrop-filter: blur(12px);
  position: sticky; top:0; z-index:50;
}
.nav-logo { font-family:'Cinzel',serif; font-size:18px; color:var(--orange); letter-spacing:0.1em; display:flex; align-items:center; gap:10px; }
.nav-logo-icon { width:30px; height:30px; background:var(--orange); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; }
.nav-badge { font-size:10px; font-weight:600; padding:3px 8px; background:var(--orange-dim); border:1px solid var(--orange); color:var(--orange); border-radius:4px; letter-spacing:0.06em; }

/* Main layout */
#main-layout {
  display:flex; gap:0; flex:1;
  max-width:1400px; margin:0 auto; width:100%;
  padding:20px 20px;
  gap:18px; align-items:flex-start;
}

/* Left: camera + AR */
#cam-section { flex-shrink:0; display:flex; flex-direction:column; gap:12px; }

#cam-wrap {
  position:relative; border-radius:16px; overflow:hidden;
  border:1px solid var(--border2);
  box-shadow: 0 0 0 1px var(--border), var(--glow2);
  width:640px;
}
#cam-wrap video  { display:block; width:640px; height:auto; }
#cam-wrap canvas { position:absolute; top:0; left:0; width:100%; height:100%; }
#video   { transform:scaleX(-1); }
#overlay { transform:scaleX(-1); }

/* Jutsu name flash overlay */
#jutsu-flash {
  position:absolute; inset:0; display:none;
  align-items:center; justify-content:center;
  pointer-events:none; z-index:20;
}
#jutsu-flash-text {
  font-family:'Cinzel',serif;
  font-size:38px; font-weight:900;
  color:#fff; letter-spacing:0.06em;
  text-shadow: 0 0 30px var(--orange), 0 0 60px var(--orange), 0 0 90px rgba(249,115,22,0.5);
  opacity:0;
}
@keyframes jutsuBoom {
  0%   { opacity:0; transform:scale(0.5) translateY(20px); }
  15%  { opacity:1; transform:scale(1.12) translateY(0); }
  70%  { opacity:1; transform:scale(1.0); }
  100% { opacity:0; transform:scale(1.05); }
}

/* Camera status bar */
#cam-status {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 14px;
  background:var(--bg2); border:1px solid var(--border); border-radius:10px;
}
.status-dot { width:8px; height:8px; border-radius:50%; background:#333; display:inline-block; margin-right:8px; }
.status-dot.active { background:var(--green); box-shadow:0 0 8px var(--green); animation:pulse 2s infinite; }
.status-dot.warn { background:var(--orange); box-shadow:0 0 8px var(--orange); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
#status-text { font-size:13px; font-weight:600; color:var(--text2); letter-spacing:0.04em; }
#debug-text  { font-size:11px; color:var(--text3); }

/* Right panel */
#right-panel { flex:1; display:flex; flex-direction:column; gap:14px; min-width:0; }

/* Jutsu selector */
#jutsu-selector { display:flex; flex-direction:column; gap:8px; }
#jutsu-selector-label { font-size:11px; font-weight:700; color:var(--text3); letter-spacing:0.12em; text-transform:uppercase; }
#jutsu-grid { display:grid; grid-template-columns:1fr 1fr; gap:7px; }
.jutsu-card {
  padding:10px 12px; border-radius:10px;
  border:1px solid var(--border);
  background:var(--bg2);
  cursor:pointer; transition:all 0.18s;
  display:flex; align-items:center; gap:10px;
}
.jutsu-card:hover { border-color:var(--border2); background:var(--bg3); }
.jutsu-card.active {
  border-color:var(--orange);
  background: rgba(249,115,22,0.08);
  box-shadow: var(--glow2);
}
.jutsu-card-icon { font-size:20px; flex-shrink:0; }
.jutsu-card-name { font-size:13px; font-weight:700; letter-spacing:0.04em; color:var(--text); }
.jutsu-card-rank { font-size:10px; color:var(--text3); margin-top:1px; }

/* Current seal display */
#seal-panel {
  background:var(--bg2); border:1px solid var(--border2); border-radius:14px;
  padding:16px; display:flex; flex-direction:column; align-items:center; gap:10px;
}
#seal-label { font-size:10px; color:var(--text3); letter-spacing:0.12em; text-transform:uppercase; align-self:flex-start; }
#seal-name  { font-family:'Cinzel',serif; font-size:22px; color:var(--gold); align-self:flex-start; }
#seal-img-wrap {
  width:100%; display:flex; align-items:center; justify-content:center;
  background:var(--bg1); border-radius:10px; padding:12px;
  border:1px solid var(--border); min-height:160px;
}
#seal-img-wrap img { max-width:100%; height:auto; display:block; }
#seal-hint {
  font-size:12px; color:var(--text2); line-height:1.6; align-self:flex-start;
  padding:8px 10px; background:var(--bg3); border-radius:8px; width:100%;
  border-left:2px solid var(--orange);
}
.idle-msg { font-size:14px; color:var(--text3); text-align:center; padding:30px 0; }

/* Sequence tracker */
#seq-panel { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:12px; }
#seq-label { font-size:10px; color:var(--text3); letter-spacing:0.12em; text-transform:uppercase; margin-bottom:8px; }
#seq-pills { display:flex; gap:5px; flex-wrap:wrap; }
.seq-pill {
  padding:4px 10px; border-radius:5px; font-size:11px; font-weight:700;
  border:1px solid var(--border); background:var(--bg1); color:var(--text3);
  letter-spacing:0.04em; transition:all 0.2s;
}
.seq-pill.done   { background:#041f12; border-color:var(--green); color:var(--green); }
.seq-pill.active { background:rgba(249,115,22,0.12); border-color:var(--orange); color:var(--orange); box-shadow:0 0 8px rgba(249,115,22,0.2); }

/* Hold meter */
#hold-panel { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:12px; display:flex; flex-direction:column; gap:8px; }
.meter-row { display:flex; align-items:center; gap:9px; }
.meter-label { font-size:11px; font-weight:700; color:var(--text3); min-width:60px; letter-spacing:0.04em; text-transform:uppercase; }
.meter-bg { flex:1; height:5px; background:var(--bg0); border-radius:99px; overflow:hidden; border:1px solid var(--border); }
.meter-fill { height:100%; width:0%; border-radius:99px; transition:width 0.09s; }
#conf-fill { background:var(--green); }
#hold-fill { background:var(--orange); transition:width 0.07s; box-shadow:0 0 6px rgba(249,115,22,0.6); }
#conf-pct { font-size:11px; color:var(--text3); min-width:30px; text-align:right; font-weight:600; }

/* Action buttons */
#actions { display:flex; gap:8px; }
#start-btn {
  flex:1; padding:11px; border-radius:10px;
  border:1px solid var(--orange);
  background:rgba(249,115,22,0.1);
  color:var(--orange); font-family:'Rajdhani',sans-serif;
  font-size:14px; font-weight:700; cursor:pointer; letter-spacing:0.06em;
  transition:all 0.15s; text-transform:uppercase;
}
#start-btn:hover { background:rgba(249,115,22,0.2); box-shadow:var(--glow); }
#start-btn:disabled { opacity:0.4; cursor:default; }
#reset-btn {
  padding:11px 18px; border-radius:10px;
  border:1px solid var(--border2);
  background:var(--bg2);
  color:var(--text2); font-family:'Rajdhani',sans-serif;
  font-size:13px; font-weight:600; cursor:pointer; letter-spacing:0.04em;
  transition:all 0.15s;
}
#reset-btn:hover { background:var(--bg3); border-color:var(--text3); }

/* Win banner */
#win-banner {
  display:none; padding:16px; border-radius:12px;
  background:linear-gradient(135deg, rgba(167,139,250,0.1), rgba(249,115,22,0.1));
  border:1px solid var(--purple); text-align:center;
}
#win-banner .wt { font-family:'Cinzel',serif; font-size:18px; color:var(--gold); margin-bottom:5px; }
#win-banner .ws { font-size:13px; color:var(--purple); }

/* Responsive */
@media (max-width:900px) {
  #main-layout { flex-direction:column; }
  #cam-wrap, #cam-wrap video { width:100%; }
  #jutsu-grid { grid-template-columns:1fr 1fr 1fr; }
}
</style>
</head>

<div id="loading-screen">
  <div class="nav-logo-icon" style="width:52px;height:52px;font-size:24px;background:transparent;border:2px solid var(--orange);color:var(--orange)">忍</div>
  <div class="load-logo">SHINOBI ACADEMY</div>
  <div class="load-sub">Loading MediaPipe Hand Tracking</div>
  <div class="load-bar-bg"><div class="load-bar"></div></div>
</div>

<div id="app">
  <nav>
    <div class="nav-logo">
      <div class="nav-logo-icon" style="background:transparent;border:1.5px solid var(--orange);color:var(--orange);font-size:16px;font-family:'Cinzel',serif">忍</div>
      SHINOBI ACADEMY
    </div>
    <div class="nav-badge">HAND SIGN TRAINER</div>
  </nav>

  <div id="main-layout">
    <!-- Camera feed -->
    <div id="cam-section">
      <div id="cam-wrap">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
        <div id="jutsu-flash"><span id="jutsu-flash-text"></span></div>
      </div>
      <div id="cam-status">
        <div style="display:flex;align-items:center">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-text">Camera offline</span>
        </div>
        <span id="debug-text"></span>
      </div>
    </div>

    <!-- Right panel -->
    <div id="right-panel">
      <div id="jutsu-selector">
        <div id="jutsu-selector-label">Select Jutsu</div>
        <div id="jutsu-grid"></div>
      </div>

      <div id="seal-panel">
        <div id="seal-label">Current Seal</div>
        <div id="seal-name" style="display:none"></div>
        <div id="seal-img-wrap">
          <div class="idle-msg">Select a jutsu to begin training</div>
        </div>
        <div id="seal-hint" style="display:none"></div>
      </div>

      <div id="seq-panel">
        <div id="seq-label">Sequence</div>
        <div id="seq-pills"></div>
      </div>

      <div id="hold-panel">
        <div class="meter-row">
          <span class="meter-label">Gesture</span>
          <div class="meter-bg"><div class="meter-fill" id="conf-fill"></div></div>
          <span id="conf-pct">0%</span>
        </div>
        <div class="meter-row">
          <span class="meter-label">Hold</span>
          <div class="meter-bg"><div class="meter-fill" id="hold-fill"></div></div>
        </div>
      </div>

      <div id="win-banner">
        <div class="wt" id="win-name"></div>
        <div class="ws" id="win-desc"></div>
      </div>

      <div id="actions">
        <button id="start-btn" onclick="startCamera()">⚡ Enable Camera</button>
        <button id="reset-btn" onclick="resetJutsu()">↺ Reset</button>
      </div>
    </div>
  </div>
</div>

// ── Gesture detection ─────────────────────────────────────────────────────────
const up   = (lm,t,p)=> lm[t].y < lm[p].y - 0.06;
const curl = (lm,t,m)=> lm[t].y > lm[m].y - 0.03;
const tSpread = lm => Math.abs(lm[4].x - lm[5].x) > 0.09;
const tTuck   = lm => !tSpread(lm) && lm[4].y > lm[5].y - 0.04;

const iI=lm=>up(lm,8,6),   iM=lm=>up(lm,12,10);
const iR=lm=>up(lm,16,14), iP=lm=>up(lm,20,18);
const cI=lm=>curl(lm,8,5), cM=lm=>curl(lm,12,9);
const cR=lm=>curl(lm,16,13),cP=lm=>curl(lm,20,17);
const allUp=lm=>iI(lm)&&iM(lm)&&iR(lm)&&iP(lm);
const allCurl=lm=>cI(lm)&&cM(lm)&&cR(lm)&&cP(lm);

const GESTURES = {
  snake:  lm=>allUp(lm)&&tSpread(lm),
  hare:   lm=>iI(lm)&&iM(lm)&&iR(lm)&&cP(lm),
  dragon: lm=>iI(lm)&&iM(lm)&&iR(lm)&&iP(lm)&&tTuck(lm),
  dog:    lm=>iI(lm)&&!iM(lm)&&!iR(lm)&&iP(lm),
  tiger:  lm=>iI(lm)&&!iM(lm)&&!iR(lm)&&!iP(lm)&&tSpread(lm),
  ox:     lm=>iI(lm)&&iM(lm)&&cR(lm)&&cP(lm)&&tTuck(lm),
  ram:    lm=>iI(lm)&&iM(lm)&&cR(lm)&&cP(lm),
  bird:   lm=>!iI(lm)&&iM(lm)&&!iR(lm)&&!iP(lm),
  monkey: lm=>cI(lm)&&cM(lm)&&cR(lm)&&iP(lm),
  rat:    lm=>allCurl(lm)&&tSpread(lm),
  boar:   lm=>allCurl(lm)&&tTuck(lm),
  horse:  lm=>allCurl(lm)&&tTuck(lm),
};
const G_ORDER=['snake','hare','dragon','dog','tiger','ox','ram','bird','monkey','rat','boar','horse'];

function detect(lm){
  for(const id of G_ORDER){ try{ if(GESTURES[id](lm)) return id; }catch(e){} }
  return null;
}

// ── AR Effects ────────────────────────────────────────────────────────────────
let effectActive=false,effectType=null,effectStart=0,effectParticles=[];
let lastLM=null;
const EFF_DUR=5500;

function startEffect(type,lm){
  effectActive=true; effectType=type;
  effectStart=Date.now(); effectParticles=[];
  if(type==='rasengan') initRasengan();
  if(type==='chidori')  initChidori();
  if(type==='fireball') initFireball();
  if(type==='shadow')   initShadow();
  if(type==='water')    initWater();
}

function palmPos(lm,cw,ch){
  return{ x:(1-((lm[0].x+lm[9].x)/2))*cw, y:((lm[0].y+lm[9].y)/2)*ch };
}

// RASENGAN ────────────────────────────────────────────────────────────────────
function initRasengan(){
  for(let i=0;i<280;i++) effectParticles.push({
    angle:Math.random()*Math.PI*2,
    speed:(0.04+Math.random()*0.1)*(Math.random()<0.5?1:-0.65),
    r:6+Math.random()*55, size:1.2+Math.random()*3.8,
    a:0.5+Math.random()*0.5,
    col:Math.random()<0.5?[160,225,255]:Math.random()<0.5?[255,255,255]:[100,180,255],
  });
}
function drawRasengan(ctx,lm,t,cw,ch){
  const {x:cx,y:cy}=palmPos(lm,cw,ch);
  const grow=Math.min(1,t*2.5); const R=70*grow; const spin=t*6;
  // halos
  for(let i=4;i>=1;i--){
    const g=ctx.createRadialGradient(cx,cy,0,cx,cy,R*i*0.6);
    g.addColorStop(0,`rgba(80,180,255,${0.07/i})`);
    g.addColorStop(1,'rgba(0,40,200,0)');
    ctx.beginPath();ctx.arc(cx,cy,R*i*0.6,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
  }
  // core
  const cg=ctx.createRadialGradient(cx,cy,0,cx,cy,R);
  cg.addColorStop(0,'rgba(255,255,255,0.97)');
  cg.addColorStop(0.25,'rgba(210,245,255,0.9)');
  cg.addColorStop(0.6,'rgba(60,160,255,0.6)');
  cg.addColorStop(1,'rgba(0,80,255,0)');
  ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fillStyle=cg;ctx.fill();
  // spinning streaks
  for(const p of effectParticles){
    const a=p.angle+spin*p.speed;
    const px=cx+Math.cos(a)*p.r*grow, py=cy+Math.sin(a)*p.r*grow*0.55;
    ctx.beginPath();ctx.arc(px,py,p.size*grow,0,Math.PI*2);
    ctx.fillStyle=`rgba(${p.col[0]},${p.col[1]},${p.col[2]},${p.a*grow})`;ctx.fill();
  }
  // edge ring
  ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);
  ctx.strokeStyle=`rgba(180,230,255,${0.5*grow})`;ctx.lineWidth=2;ctx.stroke();
  if(t<0.15){
    ctx.beginPath();ctx.arc(cx,cy,R*0.45,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${(0.15-t)/0.15*0.9})`;ctx.fill();
  }
}

// CHIDORI ─────────────────────────────────────────────────────────────────────
function initChidori(){}
function bolt(ctx,x0,y0,x1,y1,r,ml){
  const dx=x1-x0,dy=y1-y0,L=Math.sqrt(dx*dx+dy*dy);
  if(L<ml){ctx.moveTo(x0,y0);ctx.lineTo(x1,y1);return;}
  const mx=(x0+x1)/2+(Math.random()-0.5)*r*L;
  const my=(y0+y1)/2+(Math.random()-0.5)*r*L;
  bolt(ctx,x0,y0,mx,my,r*0.85,ml);
  bolt(ctx,mx,my,x1,y1,r*0.85,ml);
  if(Math.random()<0.28) bolt(ctx,mx,my,mx+(Math.random()-0.5)*55,my-Math.random()*55,r*0.65,ml*2);
}
function drawChidori(ctx,lm,t,cw,ch){
  const {x:cx,y:cy}=palmPos(lm,cw,ch);
  const I=Math.min(1,t*2.8);
  // aura
  const ag=ctx.createRadialGradient(cx,cy,0,cx,cy,80*I);
  ag.addColorStop(0,`rgba(190,225,255,${0.8*I})`);
  ag.addColorStop(0.4,`rgba(80,160,255,${0.45*I})`);
  ag.addColorStop(1,'rgba(0,60,255,0)');
  ctx.beginPath();ctx.arc(cx,cy,80*I,0,Math.PI*2);ctx.fillStyle=ag;ctx.fill();
  // crackling bolts
  for(let b=0;b<8;b++){
    const ang=(b/8)*Math.PI*2+t*1.5+Math.random()*0.4;
    const bl=(50+Math.random()*60)*I;
    const x1=cx+Math.cos(ang)*bl, y1=cy+Math.sin(ang)*bl;
    ctx.beginPath();ctx.strokeStyle=`rgba(100,180,255,${0.5*I})`;ctx.lineWidth=4;
    bolt(ctx,cx,cy,x1,y1,0.3,10);ctx.stroke();
    ctx.beginPath();ctx.strokeStyle=`rgba(255,255,255,${0.92*I})`;ctx.lineWidth=1.5;
    bolt(ctx,cx,cy,x1,y1,0.25,8);ctx.stroke();
  }
  // sparks scatter
  for(let s=0;s<5;s++){
    const sa=Math.random()*Math.PI*2, sr=15+Math.random()*50;
    ctx.beginPath();ctx.arc(cx+Math.cos(sa)*sr,cy+Math.sin(sa)*sr,2.5,0,Math.PI*2);
    ctx.fillStyle=`rgba(200,230,255,${0.8*I})`;ctx.fill();
  }
  // bright core
  ctx.beginPath();ctx.arc(cx,cy,18*I,0,Math.PI*2);
  ctx.fillStyle=`rgba(255,255,255,${0.95*I})`;ctx.fill();
}

// FIREBALL ────────────────────────────────────────────────────────────────────
function initFireball(){
  for(let i=0;i<240;i++){
    const ang=Math.random()*Math.PI*2, spd=1.2+Math.random()*4;
    effectParticles.push({
      vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd-Math.random()*2,
      born:Math.random()*0.4, size:6+Math.random()*24,
      col:Math.random()<0.4?[255,70,10]:Math.random()<0.5?[255,170,20]:[255,230,60],
    });
  }
}
function drawFireball(ctx,lm,t,cw,ch){
  const ox=cw/2, oy=ch*0.16;
  const grow=Math.min(1,t*3.2), R=cw*0.44*grow;
  // expanding ball
  const fg=ctx.createRadialGradient(ox,oy,0,ox,oy,R);
  fg.addColorStop(0,`rgba(255,255,200,${0.95*(1-t*0.9)})`);
  fg.addColorStop(0.2,`rgba(255,150,20,${0.88*(1-t*0.75)})`);
  fg.addColorStop(0.55,`rgba(220,35,0,${0.65*(1-t*0.65)})`);
  fg.addColorStop(1,'rgba(80,0,0,0)');
  ctx.beginPath();ctx.arc(ox,oy,R,0,Math.PI*2);ctx.fillStyle=fg;ctx.fill();
  // heat distortion ring
  ctx.beginPath();ctx.arc(ox,oy,R*1.1,0,Math.PI*2);
  ctx.strokeStyle=`rgba(255,100,0,${0.3*grow*(1-t)})`;ctx.lineWidth=3;ctx.stroke();
  // particles
  const el=t*EFF_DUR;
  for(const p of effectParticles){
    const age=(el*0.001-p.born)/1.4;
    if(age<0||age>1) continue;
    const px=ox+p.vx*el*0.13, py=oy+p.vy*el*0.13;
    const sz=p.size*(0.3+grow*0.7)*(1-age*0.5);
    ctx.beginPath();ctx.arc(px,py,sz,0,Math.PI*2);
    ctx.fillStyle=`rgba(${p.col[0]},${p.col[1]},${p.col[2]},${(1-age)*0.85})`;ctx.fill();
  }
}

// SHADOW CLONE ────────────────────────────────────────────────────────────────
function initShadow(){}
function drawShadow(ctx,lm,t,cw,ch){
  // Phase 1: white flash
  if(t<0.12){
    const f=t<0.06?t/0.06:1-(t-0.06)/0.06;
    ctx.fillStyle=`rgba(255,255,255,${f*0.95})`;ctx.fillRect(0,0,cw,ch);
    return;
  }
  // Phase 2: dark blue energy build
  if(t<0.45){
    const f=(t-0.12)/0.33;
    ctx.fillStyle=`rgba(8,12,50,${f*0.5})`;ctx.fillRect(0,0,cw,ch);
    const aura=ctx.createRadialGradient(cw/2,ch/2,0,cw/2,ch/2,cw*0.7);
    aura.addColorStop(0,'rgba(80,120,255,0)');
    aura.addColorStop(0.6,`rgba(60,100,255,${f*0.2})`);
    aura.addColorStop(1,`rgba(30,60,200,${f*0.4})`);
    ctx.beginPath();ctx.arc(cw/2,ch/2,cw*0.7,0,Math.PI*2);ctx.fillStyle=aura;ctx.fill();
  }
  // Phase 3: speed lines
  if(t>0.3&&t<0.55){
    const f=(t-0.3)/0.25;
    ctx.save();ctx.globalAlpha=Math.min(f,1-f*0.5)*0.6;
    for(let i=0;i<30;i++){
      const ang=(i/30)*Math.PI*2;
      const r0=cw*0.04, r1=cw*0.6*Math.min(1,f*3);
      ctx.beginPath();ctx.strokeStyle='rgba(160,190,255,0.7)';ctx.lineWidth=1.2;
      ctx.moveTo(cw/2+Math.cos(ang)*r0,ch/2+Math.sin(ang)*r0);
      ctx.lineTo(cw/2+Math.cos(ang)*r1,ch/2+Math.sin(ang)*r1);
      ctx.stroke();
    }
    ctx.restore();
  }
  // Phase 4: ghost silhouettes
  if(t>0.38&&t<0.88){
    const f=t<0.5?(t-0.38)/0.12:t<0.78?1:(0.88-t)/0.1;
    const ghosts=[-cw*0.28,cw*0.28];
    for(const ox of ghosts){
      ctx.save();ctx.globalAlpha=Math.max(0,f*0.6);
      const gx=cw/2+ox, gy=ch/2;
      const gg=ctx.createRadialGradient(gx,gy-ch*0.05,0,gx,gy,ch*0.42);
      gg.addColorStop(0,'rgba(180,210,255,0.95)');
      gg.addColorStop(0.35,'rgba(140,180,255,0.75)');
      gg.addColorStop(0.7,'rgba(80,120,255,0.4)');
      gg.addColorStop(1,'rgba(40,80,255,0)');
      ctx.beginPath();ctx.ellipse(gx,gy,cw*0.14,ch*0.38,0,0,Math.PI*2);
      ctx.fillStyle=gg;ctx.fill();
      ctx.restore();
    }
  }
  // Phase 5: kanji text
  if(t>0.48&&t<0.78){
    const f=t<0.55?(t-0.48)/0.07:t<0.71?1:(0.78-t)/0.07;
    ctx.save();ctx.globalAlpha=f;
    ctx.font=`900 ${Math.floor(ch*0.11)}px serif`;
    ctx.fillStyle='rgba(255,255,255,0.97)';ctx.textAlign='center';
    ctx.shadowColor='rgba(100,160,255,1)';ctx.shadowBlur=35;
    ctx.fillText('影分身の術',cw/2,ch*0.5);
    ctx.restore();
  }
  // Phase 6: fade out
  if(t>0.8){
    ctx.fillStyle=`rgba(0,0,0,${(t-0.8)/0.2*0.6})`;ctx.fillRect(0,0,cw,ch);
  }
}

// WATER DRAGON ────────────────────────────────────────────────────────────────
function initWater(){
  for(let i=0;i<320;i++) effectParticles.push({
    t:Math.random(), r:20+Math.random()*110,
    spd:0.2+Math.random()*0.55,
    sz:1.5+Math.random()*7,
    a:0.3+Math.random()*0.7,
    ys:(Math.random()-0.5)*0.65,
    col:Math.random()<0.5?[50,160,255]:Math.random()<0.5?[170,220,255]:[255,255,255],
  });
}
function drawWater(ctx,lm,t,cw,ch){
  const cx=cw/2,cy=ch/2,spin=t*4,grow=Math.min(1,t*2.2);
  // central glow
  const wg=ctx.createRadialGradient(cx,cy,0,cx,cy,cw*0.3*grow);
  wg.addColorStop(0,`rgba(40,140,255,${0.15*grow})`);
  wg.addColorStop(1,'rgba(0,60,200,0)');
  ctx.beginPath();ctx.arc(cx,cy,cw*0.3*grow,0,Math.PI*2);ctx.fillStyle=wg;ctx.fill();
  // spiral body
  for(const p of effectParticles){
    const a=p.t*Math.PI*10+spin*p.spd;
    const r=p.r*grow;
    const px=cx+Math.cos(a)*r, py=cy+Math.sin(a)*r*0.42+p.ys*ch*0.25*grow;
    const pal=p.a*grow*Math.max(0,Math.sin(p.t*Math.PI));
    ctx.beginPath();ctx.arc(px,py,p.sz*grow,0,Math.PI*2);
    ctx.fillStyle=`rgba(${p.col[0]},${p.col[1]},${p.col[2]},${pal})`;ctx.fill();
  }
  // dragon head bright orb
  if(t>0.25){
    const ha=spin*0.8;
    const hx=cx+Math.cos(ha)*120*grow, hy=cy+Math.sin(ha)*60*grow;
    const hg=ctx.createRadialGradient(hx,hy,0,hx,hy,40);
    hg.addColorStop(0,'rgba(255,255,255,0.97)');
    hg.addColorStop(0.35,'rgba(140,220,255,0.7)');
    hg.addColorStop(1,'rgba(0,100,220,0)');
    ctx.beginPath();ctx.arc(hx,hy,40,0,Math.PI*2);ctx.fillStyle=hg;ctx.fill();
    // eye
    ctx.beginPath();ctx.arc(hx+8,hy-5,5,0,Math.PI*2);
    ctx.fillStyle='rgba(255,50,0,0.9)';ctx.fill();
  }
}

// ── Dispatch ──────────────────────────────────────────────────────────────────
function drawEffect(ctx,lm,cw,ch){
  if(!effectActive) return;
  const t=Math.min(1,(Date.now()-effectStart)/EFF_DUR);
  if(t>=1){effectActive=false;return;}
  const use=lm||lastLM;
  switch(effectType){
    case'rasengan': if(use) drawRasengan(ctx,use,t,cw,ch); break;
    case'chidori':  if(use) drawChidori(ctx,use,t,cw,ch);  break;
    case'fireball': drawFireball(ctx,use,t,cw,ch); break;
    case'shadow':   drawShadow(ctx,use,t,cw,ch);   break;
    case'water':    drawWater(ctx,use,t,cw,ch);    break;
  }
}

// ── Game state ────────────────────────────────────────────────────────────────
let currentJutsu=null,currentStep=0,holdTarget=null,holdStart=0;
const HOLD_MS=950;

function setStatus(msg,state){
  const dot=document.getElementById('status-dot');
  document.getElementById('status-text').textContent=msg;
  dot.className='status-dot'+(state==='active'?' active':state==='warn'?' warn':'');
}
function setConf(v){
  document.getElementById('conf-fill').style.width=(v*100)+'%';
  document.getElementById('conf-pct').textContent=Math.round(v*100)+'%';
}
function setHold(v){document.getElementById('hold-fill').style.width=(v*100)+'%';}

function renderSealPanel(){
  const nameEl=document.getElementById('seal-name');
  const imgEl=document.getElementById('seal-img-wrap');
  const hintEl=document.getElementById('seal-hint');
  if(!currentJutsu){
    nameEl.style.display='none'; hintEl.style.display='none';
    imgEl.innerHTML='<div class="idle-msg">Select a jutsu to begin training</div>';
    return;
  }
  if(currentStep>=currentJutsu.seals.length) return;
  const sId=currentJutsu.seals[currentStep];
  const meta=SEAL_META[sId];
  const img=SEAL_IMGS[sId];
  nameEl.style.display='block';
  nameEl.textContent=meta.label;
  document.getElementById('seal-label').textContent=
    `Seal ${currentStep+1} of ${currentJutsu.seals.length}`;
  imgEl.innerHTML=img
    ? `<img src="${img}" style="max-width:240px;height:auto" alt="${meta.label}">`
    : `<div style="color:var(--text3);font-size:13px">${meta.label}</div>`;
  hintEl.style.display='block';
  hintEl.textContent=meta.hint;
}

function renderSeq(){
  const el=document.getElementById('seq-pills');
  if(!currentJutsu){el.innerHTML='<span style="color:var(--text3);font-size:12px">—</span>';return;}
  el.innerHTML=currentJutsu.seals.map((s,i)=>{
    const cls=i<currentStep?'seq-pill done':i===currentStep?'seq-pill active':'seq-pill';
    return `<div class="${cls}">${SEAL_META[s]?.label||s}</div>`;
  }).join('');
}

function buildJutsuGrid(){
  const grid=document.getElementById('jutsu-grid');
  JUTSU.forEach(j=>{
    const c=document.createElement('div');
    c.className='jutsu-card'; c.id='jcard-'+j.id;
    c.innerHTML=`<span class="jutsu-card-icon">${j.icon}</span>
      <div><div class="jutsu-card-name">${j.name}</div><div class="jutsu-card-rank">${j.rank} • ${j.seals.length} seals</div></div>`;
    c.onclick=()=>selectJutsu(j.id);
    grid.appendChild(c);
  });
}

function selectJutsu(id){
  currentJutsu=JUTSU.find(j=>j.id===id);
  currentStep=0; holdTarget=null; holdStart=0; effectActive=false;
  document.querySelectorAll('.jutsu-card').forEach(c=>c.classList.remove('active'));
  document.getElementById('jcard-'+id).classList.add('active');
  document.getElementById('win-banner').style.display='none';
  setHold(0); setConf(0);
  renderSealPanel(); renderSeq();
}

function resetJutsu(){
  if(!currentJutsu) return;
  currentStep=0; holdTarget=null; holdStart=0; effectActive=false;
  setHold(0); setConf(0);
  document.getElementById('win-banner').style.display='none';
  renderSealPanel(); renderSeq();
  setStatus('Ready','active');
}

function advanceSeal(){
  currentStep++; holdTarget=null; holdStart=0; setHold(0);
  renderSeq();
  if(currentStep>=currentJutsu.seals.length){ activateJutsu(); }
  else { renderSealPanel(); setStatus(`Next: ${SEAL_META[currentJutsu.seals[currentStep]]?.label}`,'active'); }
}

function activateJutsu(){
  setStatus('JUTSU ACTIVATED!','warn');
  startEffect(currentJutsu.effect,lastLM);
  // Kanji flash
  const fl=document.getElementById('jutsu-flash');
  const ft=document.getElementById('jutsu-flash-text');
  ft.textContent=currentJutsu.flashText;
  fl.style.display='flex';
  ft.style.animation='none'; void ft.offsetWidth;
  ft.style.animation='jutsuBoom 2s ease forwards';
  setTimeout(()=>fl.style.display='none',2100);
  // Win banner
  document.getElementById('win-banner').style.display='block';
  document.getElementById('win-name').textContent=currentJutsu.icon+' '+currentJutsu.flashText;
  document.getElementById('win-desc').textContent=`${currentJutsu.name} activated! Watch the effect on your camera feed.`;
  document.getElementById('seal-label').textContent='Jutsu Active';
  document.getElementById('seal-name').textContent=currentJutsu.flashText;
  document.getElementById('seal-img-wrap').innerHTML=
    `<div style="font-size:52px;padding:20px">${currentJutsu.icon}</div>`;
  document.getElementById('seal-hint').style.display='none';
}

// ── Camera + MediaPipe ────────────────────────────────────────────────────────
async function startCamera(){
  const btn=document.getElementById('start-btn');
  btn.textContent='Starting...'; btn.disabled=true;
  setStatus('Requesting camera...','');
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:640,height:480}});
    const vid=document.getElementById('video');
    vid.srcObject=stream;
    await new Promise(r=>vid.onloadedmetadata=r);
    await vid.play();
    const ov=document.getElementById('overlay');
    ov.width=vid.videoWidth||640; ov.height=vid.videoHeight||480;
    btn.style.display='none';
    setStatus('Camera active — select a jutsu!','active');
    initMediaPipe(vid,ov);
  }catch(e){
    setStatus('Camera error: '+e.message,'');
    btn.textContent='⚡ Enable Camera'; btn.disabled=false;
  }
}

function initMediaPipe(vid,ov){
  const ctx=ov.getContext('2d');
  const cw=ov.width,ch=ov.height;
  const hands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}`});
  hands.setOptions({maxNumHands:2,modelComplexity:1,minDetectionConfidence:0.72,minTrackingConfidence:0.65});

  hands.onResults(res=>{
    ctx.clearRect(0,0,cw,ch);
    const lm=res.multiHandLandmarks?.[0]||null;
    if(lm) lastLM=lm;
    if(res.multiHandLandmarks){
      for(const lmk of res.multiHandLandmarks){
        drawConnectors(ctx,lmk,HAND_CONNECTIONS,{color:'rgba(251,191,36,0.7)',lineWidth:2});
        drawLandmarks(ctx,lmk,{color:'rgba(249,115,22,0.9)',lineWidth:1,radius:3});
      }
    }
    drawEffect(ctx,lm,cw,ch);
    if(effectActive) return;

    if(!lm){
      setConf(0); setHold(0); holdTarget=null;
      if(currentJutsu&&currentStep<currentJutsu.seals.length)
        setStatus('No hand — show your hand in frame','warn');
      document.getElementById('debug-text').textContent='No hand detected';
      return;
    }
    const g=detect(lm);
    const ts=(Math.abs(lm[4].x-lm[5].x)).toFixed(3);
    document.getElementById('debug-text').textContent=g?`${g} | spread:${ts}`:`— | ${ts}`;
    setConf(g?0.92:0.04);

    if(!currentJutsu||currentStep>=currentJutsu.seals.length) return;
    const tgt=currentJutsu.seals[currentStep];
    if(g===tgt){
      const now=Date.now();
      if(holdTarget!==tgt){holdTarget=tgt;holdStart=now;}
      const prog=Math.min(1,(now-holdStart)/HOLD_MS);
      setHold(prog);
      setStatus(`Holding ${SEAL_META[tgt]?.label}...`,'active');
      if(prog>=1) advanceSeal();
    }else{
      if(holdTarget===tgt){holdTarget=null;setHold(0);}
      setStatus(g?`Got "${g}" — need "${SEAL_META[tgt]?.label}"`:`Form: ${SEAL_META[tgt]?.label}`,'');
    }
  });

  const cam=new Camera(vid,{onFrame:async()=>{await hands.send({image:vid});},width:640,height:480});
  cam.start();
}

window.addEventListener('load',()=>{
  const check=setInterval(()=>{
    if(typeof Hands!=='undefined'&&typeof Camera!=='undefined'&&typeof drawConnectors!=='undefined'){
      clearInterval(check);
      setTimeout(()=>{
        document.getElementById('loading-screen').style.display='none';
        document.getElementById('app').style.display='flex';
        buildJutsuGrid();
      },500);
    }
  },200);
  setTimeout(()=>{
    if(typeof Hands==='undefined')
      document.querySelector('.load-sub').textContent='Connection slow — check internet';
  },9000);
});
</script>
