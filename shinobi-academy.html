<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shinobi Academy — Jutsu Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg0:#080608; --bg1:#0e0b10; --bg2:#151118; --bg3:#1c1622;
  --border:#2a2030; --border2:#3d2f50;
  --orange:#f97316; --orange2:#fb923c; --orange-dim:rgba(249,115,22,0.12);
  --gold:#fbbf24; --blue:#60a5fa; --purple:#a78bfa; --green:#34d399; --red:#f87171;
  --text:#e8e0f0; --text2:#9080a8; --text3:#5a4870;
  --glow:0 0 20px rgba(249,115,22,0.35); --glow2:0 0 40px rgba(249,115,22,0.18);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'Rajdhani',sans-serif;background:var(--bg0);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(249,115,22,0.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(249,115,22,0.025) 1px,transparent 1px);
  background-size:48px 48px;pointer-events:none;z-index:0;}

#loading-screen{position:fixed;inset:0;background:var(--bg0);display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:1000;gap:18px;}
.load-logo{font-family:'Cinzel',serif;font-size:26px;color:var(--orange);letter-spacing:.12em;}
.load-sub{font-size:12px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;}
.load-bar-bg{width:240px;height:3px;background:var(--bg3);border-radius:99px;overflow:hidden;}
.load-bar{height:100%;width:0%;background:var(--orange);animation:loadFill 3.5s ease forwards;border-radius:99px;}
@keyframes loadFill{to{width:100%;}}

#app{display:none;flex-direction:column;min-height:100vh;position:relative;z-index:1;}

nav{display:flex;align-items:center;justify-content:space-between;padding:13px 26px;
  border-bottom:1px solid var(--border);background:rgba(8,6,8,0.92);
  backdrop-filter:blur(12px);position:sticky;top:0;z-index:50;}
.nav-logo{font-family:'Cinzel',serif;font-size:17px;color:var(--orange);letter-spacing:.1em;
  display:flex;align-items:center;gap:10px;}
.nav-kanji{width:30px;height:30px;border:1.5px solid var(--orange);color:var(--orange);
  border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;}
.nav-badge{font-size:10px;font-weight:700;padding:3px 9px;background:var(--orange-dim);
  border:1px solid var(--orange);color:var(--orange);border-radius:4px;letter-spacing:.06em;}

#main-layout{display:flex;gap:16px;flex:1;max-width:1380px;margin:0 auto;
  width:100%;padding:18px;align-items:flex-start;}

/* Camera */
#cam-section{flex-shrink:0;display:flex;flex-direction:column;gap:10px;}
#cam-wrap{position:relative;border-radius:16px;overflow:hidden;
  border:1px solid var(--border2);box-shadow:0 0 0 1px var(--border),var(--glow2);width:640px;}
#cam-wrap video{display:block;width:640px;height:auto;}
#cam-wrap canvas{position:absolute;top:0;left:0;width:100%;height:100%;}
#video{transform:scaleX(-1);}
#overlay{transform:scaleX(-1);}

/* Clone canvas — raw video pixels, NOT mirrored, for clone compositing */
#clone-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}

#jutsu-flash{position:absolute;inset:0;display:none;align-items:center;justify-content:center;pointer-events:none;z-index:20;}
#jutsu-flash-text{font-family:'Cinzel',serif;font-size:36px;font-weight:900;color:#fff;letter-spacing:.06em;
  text-shadow:0 0 30px var(--orange),0 0 60px var(--orange);opacity:0;}
@keyframes jutsuBoom{
  0%{opacity:0;transform:scale(0.5)translateY(20px);}
  15%{opacity:1;transform:scale(1.1)translateY(0);}
  70%{opacity:1;transform:scale(1);}
  100%{opacity:0;transform:scale(1.05);}
}

#cam-status{display:flex;align-items:center;justify-content:space-between;
  padding:9px 13px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;}
.sdot{width:8px;height:8px;border-radius:50%;background:#333;display:inline-block;margin-right:7px;}
.sdot.on{background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite;}
.sdot.warn{background:var(--orange);box-shadow:0 0 8px var(--orange);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
#status-text{font-size:13px;font-weight:600;color:var(--text2);letter-spacing:.04em;}
#debug-text{font-size:11px;color:var(--text3);}

/* Right panel */
#right-panel{flex:1;display:flex;flex-direction:column;gap:12px;min-width:0;}

#jutsu-selector-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px;}
#jutsu-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.jcard{padding:10px 12px;border-radius:10px;border:1px solid var(--border);
  background:var(--bg2);cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:10px;}
.jcard:hover{border-color:var(--border2);background:var(--bg3);}
.jcard.active{border-color:var(--orange);background:var(--orange-dim);box-shadow:var(--glow2);}
.jcard-icon{font-size:20px;flex-shrink:0;}
.jcard-name{font-size:13px;font-weight:700;letter-spacing:.04em;}
.jcard-rank{font-size:10px;color:var(--text3);margin-top:1px;}

#seal-panel{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;
  padding:15px;display:flex;flex-direction:column;align-items:center;gap:9px;}
#seal-step{font-size:10px;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;align-self:flex-start;}
#seal-name{font-family:'Cinzel',serif;font-size:21px;color:var(--gold);align-self:flex-start;display:none;}
#seal-img-wrap{width:100%;display:flex;align-items:center;justify-content:center;
  background:var(--bg1);border-radius:10px;padding:10px;border:1px solid var(--border);min-height:155px;}
#seal-img-wrap img{max-width:100%;height:auto;display:block;}
#seal-hint{font-size:12px;color:var(--text2);line-height:1.6;align-self:flex-start;
  padding:8px 10px;background:var(--bg3);border-radius:8px;width:100%;
  border-left:2px solid var(--orange);display:none;}
.idle-msg{font-size:13px;color:var(--text3);text-align:center;padding:28px 0;}

#seq-panel{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:11px;}
#seq-label{font-size:10px;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:7px;}
#seq-pills{display:flex;gap:5px;flex-wrap:wrap;}
.spill{padding:4px 9px;border-radius:5px;font-size:11px;font-weight:700;
  border:1px solid var(--border);background:var(--bg1);color:var(--text3);transition:all .2s;}
.spill.done{background:#041f12;border-color:var(--green);color:var(--green);}
.spill.active{background:var(--orange-dim);border-color:var(--orange);color:var(--orange);box-shadow:0 0 8px rgba(249,115,22,.2);}

#hold-panel{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:11px;display:flex;flex-direction:column;gap:8px;}
.mrow{display:flex;align-items:center;gap:8px;}
.mlabel{font-size:11px;font-weight:700;color:var(--text3);min-width:56px;letter-spacing:.04em;text-transform:uppercase;}
.mbg{flex:1;height:5px;background:var(--bg0);border-radius:99px;overflow:hidden;border:1px solid var(--border);}
.mfill{height:100%;width:0%;border-radius:99px;transition:width .09s;}
#conf-fill{background:var(--green);}
#hold-fill{background:var(--orange);box-shadow:0 0 6px rgba(249,115,22,.5);transition:width .07s;}
#conf-pct{font-size:11px;color:var(--text3);min-width:28px;text-align:right;font-weight:600;}

#win-banner{display:none;padding:14px;border-radius:12px;
  background:linear-gradient(135deg,rgba(167,139,250,.1),rgba(249,115,22,.1));
  border:1px solid var(--purple);text-align:center;}
#win-banner .wt{font-family:'Cinzel',serif;font-size:17px;color:var(--gold);margin-bottom:4px;}
#win-banner .ws{font-size:12px;color:var(--purple);}

#actions{display:flex;gap:8px;}
#start-btn{flex:1;padding:11px;border-radius:10px;border:1px solid var(--orange);
  background:rgba(249,115,22,.1);color:var(--orange);font-family:'Rajdhani',sans-serif;
  font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.06em;text-transform:uppercase;transition:all .15s;}
#start-btn:hover{background:rgba(249,115,22,.2);box-shadow:var(--glow);}
#start-btn:disabled{opacity:.4;cursor:default;}
#reset-btn{padding:11px 18px;border-radius:10px;border:1px solid var(--border2);
  background:var(--bg2);color:var(--text2);font-family:'Rajdhani',sans-serif;
  font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;}
#reset-btn:hover{background:var(--bg3);}
</style>
</head>
<body>
<div id="loading-screen">
  <div class="nav-kanji" style="width:50px;height:50px;font-size:22px;font-family:'Cinzel',serif">忍</div>
  <div class="load-logo">SHINOBI ACADEMY</div>
  <div class="load-sub">Loading MediaPipe · Hand Tracking</div>
  <div class="load-bar-bg"><div class="load-bar"></div></div>
</div>

<div id="app">
  <nav>
    <div class="nav-logo">
      <div class="nav-kanji">忍</div>
      SHINOBI ACADEMY
    </div>
    <div class="nav-badge">JUTSU TRAINER v2</div>
  </nav>
  <div id="main-layout">
    <div id="cam-section">
      <div id="cam-wrap">
        <video id="video" autoplay playsinline muted></video>
        <!-- Layer order: clone canvas (bottom) → overlay (skeleton+AR) → flash (top) -->
        <canvas id="clone-canvas"></canvas>
        <canvas id="overlay"></canvas>
        <div id="jutsu-flash"><span id="jutsu-flash-text"></span></div>
      </div>
      <div id="cam-status">
        <div style="display:flex;align-items:center">
          <span class="sdot" id="sdot"></span>
          <span id="status-text">Camera offline</span>
        </div>
        <span id="debug-text"></span>
      </div>
    </div>
    <div id="right-panel">
      <div>
        <div id="jutsu-selector-label">Select Jutsu</div>
        <div id="jutsu-grid"></div>
      </div>
      <div id="seal-panel">
        <div id="seal-step">Select a jutsu</div>
        <div id="seal-name"></div>
        <div id="seal-img-wrap"><div class="idle-msg">Pick a jutsu to begin training</div></div>
        <div id="seal-hint"></div>
      </div>
      <div id="seq-panel">
        <div id="seq-label">Sequence</div>
        <div id="seq-pills"></div>
      </div>
      <div id="hold-panel">
        <div class="mrow">
          <span class="mlabel">Gesture</span>
          <div class="mbg"><div class="mfill" id="conf-fill"></div></div>
          <span id="conf-pct">0%</span>
        </div>
        <div class="mrow">
          <span class="mlabel">Hold</span>
          <div class="mbg"><div class="mfill" id="hold-fill"></div></div>
        </div>
      </div>
      <div id="win-banner"><div class="wt" id="win-name"></div><div class="ws" id="win-desc"></div></div>
      <div id="actions">
        <button id="start-btn" onclick="startCamera()">⚡ Enable Camera</button>
        <button id="reset-btn" onclick="resetJutsu()">↺ Reset</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js"></script>

  ox:    {label:'Ox',    hint:'Index + middle fingers UP. Thumb pressed firmly INWARD against palm side.'},
  tiger: {label:'Tiger', hint:'Index finger pointing UP. Thumb extended OUT to the side (L-shape).'},
  hare:  {label:'Hare',  hint:'Index + middle + ring fingers UP. Pinky curled down. Thumb tucked in.'},
  dragon:{label:'Dragon',hint:'All four fingers pointing UP. Thumb tucked across the palm.'},
  snake: {label:'Snake', hint:'Both palms fully OPEN. All five fingers spread wide. Thumbs out.'},
  horse: {label:'Horse', hint:'Tight closed fist. ALL fingers curled in. Thumb also tucked in.'},
  ram:   {label:'Ram',   hint:'Peace sign: index + middle UP only. Ring, pinky AND thumb all tucked IN.'},
  monkey:{label:'Monkey',hint:'Only the PINKY extended up. All other fingers curled. Thumb pointing out.'},
  bird:  {label:'Bird',  hint:'Only the MIDDLE finger pointing straight up. All others curled tight.'},
  dog:   {label:'Dog',   hint:'Index + pinky UP (devil horns shape). Middle and ring fingers curled down.'},

// ── FIXED Gesture Detection ───────────────────────────────────────────────────
// Key fixes:
// 1. Ram vs Ox: Ram does NOT check thumb at all (fires freely). Ox requires thumb clearly tucked.
//    They can't truly be distinguished reliably, so we make Ram the "easy" one.
// 2. Boar vs Horse: Boar fires from either hand since "both hands together" can't be detected
//    with a single hand tracker — just require a clean fist.
// 3. All checks use PIP (middle joint) not MCP for fingerUp — more reliable.

const up   = (lm,t,p) => lm[t].y < lm[p].y - 0.055;
const curl = (lm,t,m) => lm[t].y > lm[m].y - 0.028;
// Thumb spread: distance between thumb tip and index finger MCP
const tOut = lm => Math.abs(lm[4].x - lm[5].x) > 0.085;
const tIn  = lm => Math.abs(lm[4].x - lm[5].x) < 0.07 && lm[4].y > lm[5].y - 0.035;

const iI=lm=>up(lm,8,6),   iM=lm=>up(lm,12,10);
const iR=lm=>up(lm,16,14), iP=lm=>up(lm,20,18);
const cI=lm=>curl(lm,8,5), cM=lm=>curl(lm,12,9);
const cR=lm=>curl(lm,16,13),cP=lm=>curl(lm,20,17);
const allUp=lm=>iI(lm)&&iM(lm)&&iR(lm)&&iP(lm);
const allC =lm=>cI(lm)&&cM(lm)&&cR(lm)&&cP(lm);

// Boar vs Horse separation strategy:
// Both are closed fists — impossible to distinguish by finger position alone.
// Solution: remove both from the auto-detect entirely and use CONTEXT.
// The game tells the detector which one to look for via currentTarget.
// When the target is 'boar', detect fires on any clean fist.
// When the target is 'horse', detect fires on any clean fist.
// This way either seal reliably registers as a fist when that's what's expected.
// We keep them in GESTURES as identical so both work; the sequence context determines which one scores.

const GESTURES={
  snake:  lm=>allUp(lm)&&tOut(lm),
  hare:   lm=>iI(lm)&&iM(lm)&&iR(lm)&&cP(lm),
  dragon: lm=>allUp(lm)&&tIn(lm),
  dog:    lm=>iI(lm)&&!iM(lm)&&!iR(lm)&&iP(lm),
  tiger:  lm=>iI(lm)&&!iM(lm)&&!iR(lm)&&!iP(lm)&&tOut(lm),
  ram:    lm=>iI(lm)&&iM(lm)&&cR(lm)&&cP(lm),
  ox:     lm=>iI(lm)&&iM(lm)&&cR(lm)&&cP(lm)&&tIn(lm),
  bird:   lm=>!iI(lm)&&iM(lm)&&!iR(lm)&&!iP(lm),
  monkey: lm=>cI(lm)&&cM(lm)&&cR(lm)&&iP(lm),
  rat:    lm=>allC(lm)&&tOut(lm),
  fist:   lm=>allC(lm),   // catches both boar AND horse — context decides which
};
const G_ORDER=['snake','hare','dragon','dog','tiger','ram','bird','monkey','rat','fist'];

function detect(lm, targetOverride){
  // If the current target is boar or horse, just check for a fist
  if(targetOverride==='boar'||targetOverride==='horse'){
    return GESTURES.fist(lm) ? targetOverride : null;
  }
  // If current target is ox but ram would fire, suppress ram and require ox explicitly
  if(targetOverride==='ox'){
    return (iI(lm)&&iM(lm)&&cR(lm)&&cP(lm)) ? 'ox' : null;
  }
  for(const id of G_ORDER){ try{if(GESTURES[id](lm))return id;}catch(e){} }
  return null;
}

// ── AR Engine ─────────────────────────────────────────────────────────────────
let effActive=false,effType=null,effStart=0,effParts=[];
let lastLM=null,lastCW=640,lastCH=480;
const EFF_DUR=5500;

// Shadow Clone: frame buffer for cloning the user
let frameBuffer=[];          // rolling ring of ImageData frames
let cloneActive=false;
let cloneCtx=null;
let cloneStart=0;
let videoEl=null;
let vidCapCtx=null;          // offscreen canvas for capturing raw video pixels
let vidCapCanvas=null;

function initFrameCapture(vid,cw,ch){
  videoEl=vid;
  vidCapCanvas=document.createElement('canvas');
  vidCapCanvas.width=cw; vidCapCanvas.height=ch;
  vidCapCtx=vidCapCanvas.getContext('2d');
  cloneCtx=document.getElementById('clone-canvas').getContext('2d');
  // capture frames into buffer continuously
  setInterval(()=>{
    if(!videoEl) return;
    vidCapCtx.drawImage(videoEl,0,0,cw,ch);
    const frame=vidCapCtx.getImageData(0,0,cw,ch);
    frameBuffer.push(frame);
    if(frameBuffer.length>90) frameBuffer.shift(); // keep ~3s at 30fps
  },33);
}

function startEffect(type,lm){
  effActive=true; effType=type; effStart=Date.now(); effParts=[];
  if(type==='rasengan') initRasengan();
  if(type==='chidori')  initChidori();
  if(type==='fireball') initFireball();
  if(type==='shadow')   { cloneActive=true; cloneStart=Date.now(); effActive=false; seedSmoke(lastCW||640, lastCH||480); }
  if(type==='water')    initWater();
}

function palmPos(lm,cw,ch){
  return{x:(1-((lm[0].x+lm[9].x)/2))*cw, y:((lm[0].y+lm[9].y)/2)*ch};
}

// ── Shared helpers ────────────────────────────────────────────────────────────
// Finger tip positions for hand tracking
function tipPos(lm,idx,cw,ch){ return{x:(1-lm[idx].x)*cw, y:lm[idx].y*ch}; }
// Estimate face/head centre from wrist position (wrist sits ~40% down from top, face ~15%)
function facePos(lm,cw,ch){
  const wx=(1-lm[0].x)*cw, wy=lm[0].y*ch;
  // face is typically above the wrist; estimate from canvas
  return{x:cw/2, y:ch*0.18};
}


// ── RASENGAN ──────────────────────────────────────────────────────────────────
// Three distinct orbital rings at different axis tilts, clearly visible as
// loops. Inner compressed core blasts particles centrifugally outward.
// Sphere body with latitude/longitude grid and specular highlight.
function initRasengan(){
  effParts=[];
  // Ring 0: Equatorial - fast, tight, brilliant white
  for(let i=0;i<80;i++) effParts.push({
    ring:0, angle:(i/80)*Math.PI*2,
    tiltX:0, tiltY:0,        // equatorial - flat horizontal ring
    speed:4.5, r:1.0,
    sz:3+Math.random()*2, bright:0.9+Math.random()*0.1,
    col:[255,255,255],
  });
  // Ring 1: Vertical - medium speed, blue
  for(let i=0;i<60;i++) effParts.push({
    ring:1, angle:(i/60)*Math.PI*2,
    tiltX:Math.PI/2, tiltY:0.4,
    speed:-3.2, r:1.0,
    sz:2+Math.random()*2.5, bright:0.7+Math.random()*0.3,
    col:[120,210,255],
  });
  // Ring 2: Diagonal - slow, wide, cyan
  for(let i=0;i<50;i++) effParts.push({
    ring:2, angle:(i/50)*Math.PI*2,
    tiltX:Math.PI/3, tiltY:Math.PI/4+0.6,
    speed:2.2, r:1.08,
    sz:1.5+Math.random()*2, bright:0.5+Math.random()*0.4,
    col:[180,240,255],
  });
  // Centrifugal inner particles — compressed at core, flung outward
  for(let i=0;i<120;i++) effParts.push({
    ring:3,
    angle:Math.random()*Math.PI*2,
    lat:(Math.random()-0.5)*0.5,  // near equator
    speed:6+Math.random()*4,
    r:0.3+Math.random()*0.7,      // starts compressed, radiates out
    sz:1+Math.random()*2,
    bright:0.4+Math.random()*0.6,
    col:Math.random()<0.5?[255,255,255]:[160,220,255],
  });
}

function drawRasengan(ctx,lm,t,cw,ch){
  const{x:cx,y:cy}=palmPos(lm,cw,ch);
  const grow=Math.min(1,t*2.8);
  const R=Math.min(82,18+64*grow);
  const spin=t*6.5;
  ctx.save();

  // ── Deep glow halos ─────────────────────────────────────────────────────
  for(let i=6;i>=1;i--){
    const gr=ctx.createRadialGradient(cx,cy,0,cx,cy,R*i*0.45);
    gr.addColorStop(0,`rgba(40,130,255,${0.05/i})`);
    gr.addColorStop(1,'rgba(0,30,180,0)');
    ctx.beginPath();ctx.arc(cx,cy,R*i*0.45,0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();
  }

  // ── Sphere body ─────────────────────────────────────────────────────────
  const sg=ctx.createRadialGradient(cx-R*0.28,cy-R*0.28,R*0.04,cx,cy,R);
  sg.addColorStop(0,'rgba(255,255,255,0.98)');
  sg.addColorStop(0.2,'rgba(200,240,255,0.94)');
  sg.addColorStop(0.5,'rgba(50,150,255,0.82)');
  sg.addColorStop(0.8,'rgba(0,70,210,0.60)');
  sg.addColorStop(1,'rgba(0,20,130,0.20)');
  ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fillStyle=sg;ctx.fill();

  // ── Latitude lines ───────────────────────────────────────────────────────
  ctx.save();ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.clip();
  for(let lat=-4;lat<=4;lat++){
    const sinL=Math.sin(lat/4*Math.PI*0.48);
    const ry=sinL*R*0.4;
    const rx=Math.sqrt(Math.max(0,R*R-ry*ry/0.16))*0.99;
    if(rx<3) continue;
    ctx.beginPath();ctx.ellipse(cx,cy+ry,rx,rx*0.22+Math.abs(ry)*0.08,0,0,Math.PI*2);
    ctx.strokeStyle=`rgba(160,220,255,${0.28-Math.abs(lat)*0.03})`;ctx.lineWidth=1.1;ctx.stroke();
  }
  // Longitude lines — 8 spinning vertical ellipses
  for(let lon=0;lon<8;lon++){
    const a=spin*0.7+lon/8*Math.PI;
    const rx=Math.abs(Math.cos(a))*R;
    if(rx<2) continue;
    ctx.beginPath();ctx.ellipse(cx,cy,rx,R*0.99,0,0,Math.PI*2);
    ctx.strokeStyle=`rgba(120,200,255,${0.22*Math.abs(Math.cos(a))})`;ctx.lineWidth=1;ctx.stroke();
  }
  ctx.restore();

  // ── Orbital rings ────────────────────────────────────────────────────────
  for(const p of effParts){
    if(p.ring===3) continue;
    const a=p.angle+spin*p.speed*0.16;
    // Project ring onto tilted plane
    let px,py,depth;
    if(p.ring===0){
      // Equatorial ring - flat XZ plane
      px=cx+Math.cos(a)*R*p.r;
      py=cy+Math.sin(a)*R*p.r*0.28; // flatten Y to look horizontal
      depth=0.5+0.5*Math.sin(a);
    } else if(p.ring===1){
      // Vertical ring - XY plane, tilted
      const tA=a+p.tiltY;
      px=cx+Math.cos(tA)*R*p.r;
      py=cy+Math.sin(tA)*R*p.r;
      depth=0.5+0.5*Math.cos(tA);
    } else {
      // Diagonal ring
      const tA=a;
      px=cx+Math.cos(tA)*R*p.r*Math.cos(p.tiltX)+Math.sin(tA)*R*p.r*0.2;
      py=cy+Math.sin(tA)*R*p.r*0.75;
      depth=0.5+0.5*Math.cos(tA);
    }
    const vis=depth*grow*p.bright;
    if(vis<0.06) continue;
    // Particle has motion trail
    const trailLen=4;
    for(let tr=0;tr<trailLen;tr++){
      const tFrac=tr/trailLen;
      const ta=a-p.speed*0.16*(tr*0.08);
      let tpx,tpy;
      if(p.ring===0){tpx=cx+Math.cos(ta)*R*p.r;tpy=cy+Math.sin(ta)*R*p.r*0.28;}
      else if(p.ring===1){const tA2=ta+p.tiltY;tpx=cx+Math.cos(tA2)*R*p.r;tpy=cy+Math.sin(tA2)*R*p.r;}
      else{tpx=cx+Math.cos(ta)*R*p.r*Math.cos(p.tiltX)+Math.sin(ta)*R*p.r*0.2;tpy=cy+Math.sin(ta)*R*p.r*0.75;}
      ctx.beginPath();ctx.arc(tpx,tpy,p.sz*grow*(1-tFrac*0.7)*depth,0,Math.PI*2);
      ctx.fillStyle=`rgba(${p.col[0]},${p.col[1]},${p.col[2]},${vis*(1-tFrac*0.8)})`;ctx.fill();
    }
    ctx.beginPath();ctx.arc(px,py,p.sz*grow,0,Math.PI*2);
    ctx.fillStyle=`rgba(${p.col[0]},${p.col[1]},${p.col[2]},${vis})`;ctx.fill();
  }

  // ── Centrifugal inner particles ──────────────────────────────────────────
  for(const p of effParts){
    if(p.ring!==3) continue;
    const a=p.angle+spin*p.speed*0.12;
    // Radial distance oscillates and is flung outward centrifugally
    const centrifuge=p.r+(1-p.r)*Math.min(1,t*2.5);
    const px=cx+Math.cos(a)*R*centrifuge*0.95;
    const py=cy+Math.sin(a)*R*centrifuge*0.95*(0.4+p.lat*0.6);
    const vis=p.bright*grow*Math.min(1,centrifuge*1.5);
    ctx.beginPath();ctx.arc(px,py,p.sz*grow,0,Math.PI*2);
    ctx.fillStyle=`rgba(${p.col[0]},${p.col[1]},${p.col[2]},${vis})`;ctx.fill();
  }

  // ── Specular highlight ───────────────────────────────────────────────────
  const hl=ctx.createRadialGradient(cx-R*0.3,cy-R*0.3,0,cx-R*0.3,cy-R*0.3,R*0.52);
  hl.addColorStop(0,'rgba(255,255,255,0.62)');hl.addColorStop(0.5,'rgba(255,255,255,0.12)');hl.addColorStop(1,'rgba(255,255,255,0)');
  ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fillStyle=hl;ctx.fill();

  // Outer crackling ring
  ctx.beginPath();ctx.arc(cx,cy,R+2,0,Math.PI*2);
  ctx.strokeStyle=`rgba(200,240,255,${0.65*grow})`;ctx.lineWidth=2.5;ctx.stroke();
  // Second outer ring, slightly larger, dimmer
  ctx.beginPath();ctx.arc(cx,cy,R+8,0,Math.PI*2);
  ctx.strokeStyle=`rgba(100,180,255,${0.25*grow})`;ctx.lineWidth=1.5;ctx.stroke();

  // Entry flash
  if(t<0.10){
    const f=(0.10-t)/0.10;
    const fg=ctx.createRadialGradient(cx,cy,0,cx,cy,R*2.2);
    fg.addColorStop(0,`rgba(255,255,255,${f*0.9})`);fg.addColorStop(1,'rgba(255,255,255,0)');
    ctx.beginPath();ctx.arc(cx,cy,R*2.2,0,Math.PI*2);ctx.fillStyle=fg;ctx.fill();
  }
  ctx.restore();
}

// ── CHIDORI ───────────────────────────────────────────────────────────────────
function initChidori(){
  effParts=[];
  for(let b=0;b<14;b++) effParts.push({
    baseAng:(b/14)*Math.PI*2,
    len:50+Math.random()*80,
    wobble:Math.random()*0.6,
    phase:Math.random()*Math.PI*2,
  });
}
function bolt(ctx,x0,y0,x1,y1,r,ml){
  const dx=x1-x0,dy=y1-y0,L=Math.sqrt(dx*dx+dy*dy);
  if(L<ml){ctx.moveTo(x0,y0);ctx.lineTo(x1,y1);return;}
  const mx=(x0+x1)/2+(Math.random()-.5)*r*L,my=(y0+y1)/2+(Math.random()-.5)*r*L;
  bolt(ctx,x0,y0,mx,my,r*.85,ml);bolt(ctx,mx,my,x1,y1,r*.85,ml);
  if(Math.random()<.3) bolt(ctx,mx,my,mx+(Math.random()-.5)*60,my-Math.random()*65,r*.6,ml*2);
}
function drawChidori(ctx,lm,t,cw,ch){
  const{x:cx,y:cy}=palmPos(lm,cw,ch);
  const I=Math.min(1,t*3);
  ctx.save();
  for(const[r,c,a] of [[120,'rgba(140,200,255',0.14],[70,'rgba(200,230,255',0.28],[32,'rgba(255,255,255',0.60]]){
    const ag=ctx.createRadialGradient(cx,cy,0,cx,cy,r*I);
    ag.addColorStop(0,`${c},${a*I})`);ag.addColorStop(1,`${c},0)`);
    ctx.beginPath();ctx.arc(cx,cy,r*I,0,Math.PI*2);ctx.fillStyle=ag;ctx.fill();
  }
  for(const[lw,col,rough] of [
    [7,'rgba(40,120,255,0.4)',0.38],[4,'rgba(120,80,255,0.55)',0.28],[2,'rgba(255,255,255,0.95)',0.20]
  ]){
    for(const p of effParts){
      const ang=p.baseAng+t*2.0+Math.sin(t*9+p.phase)*p.wobble;
      const bl=p.len*I;
      ctx.beginPath();ctx.strokeStyle=col;ctx.lineWidth=lw;
      bolt(ctx,cx,cy,cx+Math.cos(ang)*bl,cy+Math.sin(ang)*bl,rough,6);ctx.stroke();
    }
  }
  if(Math.random()<.75){
    for(let s=0;s<10;s++){
      const sa=Math.random()*Math.PI*2,sr=18+Math.random()*70*I;
      ctx.beginPath();ctx.arc(cx+Math.cos(sa)*sr,cy+Math.sin(sa)*sr,1.5+Math.random()*2.5,0,Math.PI*2);
      ctx.fillStyle=`rgba(${Math.random()<.5?'180,220,255':'255,255,255'},${0.75*I})`;ctx.fill();
    }
  }
  const cg=ctx.createRadialGradient(cx,cy,0,cx,cy,24*I);
  cg.addColorStop(0,'rgba(255,255,255,1)');cg.addColorStop(.45,'rgba(180,220,255,.85)');cg.addColorStop(1,'rgba(60,140,255,0)');
  ctx.beginPath();ctx.arc(cx,cy,24*I,0,Math.PI*2);ctx.fillStyle=cg;ctx.fill();
  ctx.restore();
}

// ── FIREBALL ──────────────────────────────────────────────────────────────────
// Erupts from face level. Deep crimson-lava core → orange → yellow tongue tips.
// Multiple layers: expanding sphere, tongue-shaped flame jets, lava texture,
// heat shimmer, dark rolling smoke, ember sparks flying out.
function initFireball(){
  effParts=[];
  // Core fire jets — 8 tongue-shaped streams radiating upward-forward
  for(let i=0;i<8;i++){
    const spread=0.5;
    const baseAng=-Math.PI/2+(i-3.5)*spread*0.28;
    for(let j=0;j<35;j++) effParts.push({
      type:'jet',jet:i,
      baseAng, vMag:2.5+Math.random()*4.5,
      wobble:(Math.random()-0.5)*0.4,
      born:Math.random()*0.35,
      size:14+Math.random()*30,
      col:j<12?[255,240+Math.floor(Math.random()*15),0]   // yellow core
            :j<22?[255,80+Math.floor(Math.random()*60),0]  // orange mid
            :[200+Math.floor(Math.random()*40),15,0],       // red edge
    });
  }
  // Ember sparks
  for(let i=0;i<80;i++) effParts.push({
    type:'ember',
    vx:(Math.random()-0.5)*6, vy:-2-Math.random()*5,
    born:Math.random()*0.5, life:0.3+Math.random()*0.5,
    col:Math.random()<.5?[255,140,0]:[255,220,60],
  });
  // Rolling smoke chunks
  for(let i=0;i<20;i++) effParts.push({
    type:'smoke',
    ang:-Math.PI*0.5+(Math.random()-0.5)*1.2,
    spd:1.5+Math.random()*2,
    born:0.2+Math.random()*0.5,
    sz:20+Math.random()*35,
  });
}

function drawFireball(ctx,lm,t,cw,ch){
  const ox=fireOriginX||cw/2, oy=fireOriginY||ch*0.22;
  const grow=Math.min(1,t*2.2);
  const el=t*EFF_DUR;
  ctx.save();

  // ── Dark heat shimmer overlay ─────────────────────────────────────────────
  const htg=ctx.createRadialGradient(ox,oy,0,ox,oy,cw*0.55*grow);
  htg.addColorStop(0,`rgba(30,0,0,${0.40*grow*(1-t*0.5)})`);
  htg.addColorStop(0.7,`rgba(10,0,0,${0.18*grow})`);
  htg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();ctx.arc(ox,oy,cw*0.55*grow,0,Math.PI*2);ctx.fillStyle=htg;ctx.fill();

  // ── Rolling dark smoke (back layer) ──────────────────────────────────────
  for(const p of effParts){
    if(p.type!=='smoke') continue;
    const age=(el*0.001-p.born)/1.0; if(age<0||age>1) continue;
    const px=ox+Math.cos(p.ang)*p.spd*el*0.08;
    const py=oy+Math.sin(p.ang)*p.spd*el*0.08 - age*20;
    const a=(1-age)*0.55;
    const sg=ctx.createRadialGradient(px,py,0,px,py,p.sz*(0.5+age*0.8));
    sg.addColorStop(0,`rgba(18,8,0,${a})`);sg.addColorStop(0.5,`rgba(8,3,0,${a*0.5})`);sg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.arc(px,py,p.sz*(0.5+age*0.8),0,Math.PI*2);ctx.fillStyle=sg;ctx.fill();
  }

  // ── Flame jet streams ─────────────────────────────────────────────────────
  for(const p of effParts){
    if(p.type!=='jet') continue;
    const age=(el*0.001-p.born)/1.1; if(age<0||age>1) continue;
    const wobX=Math.sin(el*0.003*p.vMag+p.wobble*15)*18*age;
    const ang=p.baseAng+p.wobble*0.4*Math.sin(el*0.005);
    const px=ox+Math.cos(ang)*p.vMag*el*0.11+wobX;
    const py=oy+Math.sin(ang)*p.vMag*el*0.11;
    const sz=p.size*grow*(1-age*0.55)*(0.4+age*0.6);
    if(sz<2) continue;
    const fadeAlpha=(1-Math.pow(age,1.4))*0.92;
    // Soft gradient particle for each flame tongue
    const fg=ctx.createRadialGradient(px,py,0,px,py,sz);
    const[r,g2,b]=p.col;
    const innerBright=`rgba(255,255,${b<20?160:220},${fadeAlpha})`;
    fg.addColorStop(0,innerBright);
    fg.addColorStop(0.3,`rgba(${r},${g2},${b},${fadeAlpha*0.95})`);
    fg.addColorStop(0.65,`rgba(${Math.max(0,r-40)},${Math.max(0,g2-20)},0,${fadeAlpha*0.55})`);
    fg.addColorStop(1,'rgba(4,0,0,0)');
    ctx.beginPath();ctx.arc(px,py,sz,0,Math.PI*2);ctx.fillStyle=fg;ctx.fill();
  }

  // ── Expanding core fireball ───────────────────────────────────────────────
  const coreR=Math.max(2,62*grow*(1-t*0.28));
  const cg=ctx.createRadialGradient(ox-coreR*0.15,oy-coreR*0.1,0,ox,oy,coreR);
  cg.addColorStop(0,'rgba(255,255,220,1)');
  cg.addColorStop(0.12,'rgba(255,240,80,0.98)');
  cg.addColorStop(0.30,'rgba(255,100,0,0.94)');
  cg.addColorStop(0.55,'rgba(200,20,0,0.82)');
  cg.addColorStop(0.78,'rgba(110,0,0,0.60)');
  cg.addColorStop(1,'rgba(40,0,0,0)');
  ctx.beginPath();ctx.arc(ox,oy,coreR,0,Math.PI*2);ctx.fillStyle=cg;ctx.fill();

  // Lava surface texture — irregular dark splotches rotating with time
  ctx.save();ctx.beginPath();ctx.arc(ox,oy,coreR*0.88,0,Math.PI*2);ctx.clip();
  for(let i=0;i<16;i++){
    const la=t*1.8+i/16*Math.PI*2, lr=Math.random()*coreR*0.72;
    const lx=ox+Math.cos(la)*lr, ly=oy+Math.sin(la)*lr;
    const ls=3+Math.random()*14;
    ctx.beginPath();ctx.arc(lx,ly,ls,0,Math.PI*2);
    ctx.fillStyle=`rgba(60,4,0,${0.38+Math.random()*0.28})`;ctx.fill();
  }
  ctx.restore();

  // Heat ring shimmer at boundary
  ctx.beginPath();ctx.arc(ox,oy,coreR*1.12,0,Math.PI*2);
  ctx.strokeStyle=`rgba(255,80,0,${0.35*grow*(1-t*0.7)})`;ctx.lineWidth=3;ctx.stroke();
  ctx.beginPath();ctx.arc(ox,oy,coreR*1.28,0,Math.PI*2);
  ctx.strokeStyle=`rgba(180,30,0,${0.18*grow*(1-t*0.6)})`;ctx.lineWidth=2;ctx.stroke();

  // ── Ember sparks ──────────────────────────────────────────────────────────
  for(const p of effParts){
    if(p.type!=='ember') continue;
    const age=(el*0.001-p.born)/p.life; if(age<0||age>1) continue;
    const px=ox+p.vx*age*el*0.05, py=oy+p.vy*age*el*0.05+age*age*30;
    ctx.beginPath();ctx.arc(px,py,2+Math.random()*2,0,Math.PI*2);
    ctx.fillStyle=`rgba(${p.col[0]},${p.col[1]},0,${(1-age)*0.9})`;ctx.fill();
  }
  ctx.restore();
}

// ── WATER DRAGON ─────────────────────────────────────────────────────────────
// Anime reference: massive serpentine dragon rises from below, twisting body
// with scales, a huge open-jawed head with glowing eyes, soars across the frame.
// Body is made of churning translucent water — layered blues, white foam crests.
function initWater(){
  effParts=[];
  // Water body foam/spray particles along the spine
  for(let i=0;i<260;i++){
    const u=Math.random();
    effParts.push({
      type:'foam',u,
      side:(Math.random()<0.5?-1:1)*(8+Math.random()*44),
      vx:(Math.random()-0.5)*2, vy:-1.5-Math.random()*3,
      sz:2+Math.random()*8,
      a:0.4+Math.random()*0.55,
      born:u*0.35,
      col:Math.random()<0.45?[80,180,255]:Math.random()<0.5?[160,220,255]:[225,245,255],
    });
  }
  // Bubble particles
  for(let i=0;i<60;i++) effParts.push({
    type:'bubble',
    u:Math.random(),side:(Math.random()-0.5)*30,
    sz:3+Math.random()*9, a:0.3+Math.random()*0.4, born:Math.random()*0.4,
    vx:(Math.random()-0.5)*1.5,vy:-0.5-Math.random()*2,
  });
}

// Dragon spine path — rises from bottom-left, arcs up in an S, head at top-right
function dragonSpine(u,cw,ch,t){
  // u=0 is tail (bottom), u=1 is head (top-right)
  // Large sweeping S-curve that fills the frame
  const undulate=Math.sin(t*2.5+u*Math.PI*3)*14*(1-u*0.5);
  const x = cw*0.08 + u*cw*0.84
            + Math.sin(u*Math.PI*1.8 + t*1.5)*cw*0.12
            + undulate*0.6;
  const y = ch*0.92 - u*ch*0.72
            + Math.cos(u*Math.PI*1.2 + t*1.2)*ch*0.10
            + undulate;
  return{x,y};
}

function dragonWidth(u){ return Math.max(6,(28-u*18)); } // tapers tail→head

function drawWater(ctx,lm,t,cw,ch){
  const grow=Math.min(1,t*1.8);
  const el=t*EFF_DUR;
  const headProgress=Math.min(1,t*1.6); // head arrives before effect ends
  const visEnd=headProgress;
  const SEGS=80;
  ctx.save();

  // Build spine points
  const pts=[];
  for(let i=0;i<=SEGS;i++) pts.push(dragonSpine(i/SEGS,cw,ch,t));
  const visSegs=Math.floor(visEnd*SEGS);

  if(visSegs>3){
    // ── Outer glow halo along body ──────────────────────────────────────────
    ctx.save();ctx.globalAlpha=0.18;
    ctx.strokeStyle='rgba(60,140,255,1)';ctx.lineWidth=dragonWidth(0.4)*4;ctx.lineCap='round';ctx.lineJoin='round';
    ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
    for(let i=1;i<visSegs;i++) ctx.lineTo(pts[i].x,pts[i].y);
    ctx.stroke();ctx.restore();

    // ── Deep body — dark navy layer ─────────────────────────────────────────
    ctx.strokeStyle='rgba(5,25,100,0.88)';ctx.lineWidth=dragonWidth(0.4)*2.1;
    ctx.lineCap='round';ctx.lineJoin='round';
    ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
    for(let i=1;i<visSegs;i++) ctx.lineTo(pts[i].x,pts[i].y);
    ctx.stroke();

    // ── Mid body — bright blue ──────────────────────────────────────────────
    ctx.strokeStyle='rgba(30,120,255,0.9)';ctx.lineWidth=dragonWidth(0.4)*1.45;
    ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
    for(let i=1;i<visSegs;i++) ctx.lineTo(pts[i].x,pts[i].y);
    ctx.stroke();

    // ── Water surface highlight ─────────────────────────────────────────────
    ctx.strokeStyle='rgba(160,220,255,0.75)';ctx.lineWidth=dragonWidth(0.4)*0.55;
    ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
    for(let i=1;i<visSegs;i++) ctx.lineTo(pts[i].x,pts[i].y);
    ctx.stroke();

    // ── Scale segments every 4 pts ─────────────────────────────────────────
    for(let i=2;i<visSegs-1;i+=4){
      const p=pts[i],pn=pts[Math.min(i+2,SEGS)],pp=pts[Math.max(i-2,0)];
      const ang=Math.atan2(pn.y-pp.y,pn.x-pp.x);
      const w=dragonWidth(i/SEGS);
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(ang+Math.PI/2);
      // Scale as curved ellipse
      ctx.beginPath();ctx.ellipse(0,-w*0.1,w*0.52,w*0.28,0,0,Math.PI*2);
      ctx.fillStyle='rgba(15,55,170,0.40)';ctx.fill();
      ctx.strokeStyle='rgba(80,170,255,0.35)';ctx.lineWidth=0.9;ctx.stroke();
      ctx.restore();
    }

    // ── Dorsal fins every 10 segments ──────────────────────────────────────
    for(let i=10;i<visSegs-5;i+=10){
      const p=pts[i],pn=pts[Math.min(i+3,SEGS)],pp=pts[Math.max(i-3,0)];
      const ang=Math.atan2(pn.y-pp.y,pn.x-pp.x);
      const w=dragonWidth(i/SEGS);
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(ang-Math.PI/2);
      ctx.beginPath();ctx.moveTo(0,0);
      ctx.bezierCurveTo(w*0.6,-w*1.1, w*0.9,-w*2.2, w*0.4,-w*2.8);
      ctx.bezierCurveTo(-w*0.3,-w*2.0, -w*0.4,-w*1.0, 0,0);
      ctx.fillStyle='rgba(60,160,255,0.65)';ctx.fill();
      ctx.strokeStyle='rgba(160,230,255,0.55)';ctx.lineWidth=1.2;ctx.stroke();
      ctx.restore();
    }

    // ── Foam + bubble particles along body ─────────────────────────────────
    for(const p of effParts){
      if(p.type==='foam'||p.type==='bubble'){
        if(p.u>visEnd) continue;
        const age=(t-p.born)/0.55; if(age<0||age>1) continue;
        const sp=dragonSpine(p.u,cw,ch,t);
        const sp2=dragonSpine(Math.min(p.u+0.015,1),cw,ch,t);
        const ang=Math.atan2(sp2.y-sp.y,sp2.x-sp.x)+Math.PI/2;
        const px=sp.x+Math.cos(ang)*p.side+p.vx*age*35;
        const py=sp.y+Math.sin(ang)*p.side+p.vy*age*35;
        const alpha=p.a*(1-age)*grow;
        if(alpha<0.05) continue;
        if(p.type==='bubble'){
          ctx.beginPath();ctx.arc(px,py,p.sz*(1-age*0.4),0,Math.PI*2);
          ctx.strokeStyle=`rgba(180,230,255,${alpha*0.8})`;ctx.lineWidth=1;ctx.stroke();
          ctx.fillStyle=`rgba(200,240,255,${alpha*0.25})`;ctx.fill();
        } else {
          ctx.beginPath();ctx.arc(px,py,p.sz*(1-age*0.5),0,Math.PI*2);
          ctx.fillStyle=`rgba(${p.col[0]},${p.col[1]},${p.col[2]},${alpha})`;ctx.fill();
        }
      }
    }
  }

  // ── DRAGON HEAD ────────────────────────────────────────────────────────────
  if(headProgress>0.4){
    const headIdx=Math.min(Math.floor(headProgress*SEGS),SEGS);
    const hp=pts[Math.min(headIdx,SEGS)];
    const hpB=pts[Math.max(headIdx-5,0)];
    const headAng=Math.atan2(hp.y-hpB.y,hp.x-hpB.x);
    const hS=Math.min(1,(headProgress-0.4)/0.35); // head size grow
    const H=36*hS; // half-height of head

    ctx.save();ctx.translate(hp.x,hp.y);ctx.rotate(headAng);

    // Shadow
    ctx.beginPath();ctx.ellipse(6,6,H*1.35,H*0.78,0,0,Math.PI*2);
    ctx.fillStyle='rgba(0,15,80,0.55)';ctx.fill();

    // ── Head bulk ─────────────────────────────────────────────────────────
    ctx.beginPath();ctx.ellipse(0,0,H*1.3,H*0.75,0,0,Math.PI*2);
    ctx.fillStyle='rgba(12,60,190,0.94)';ctx.fill();
    ctx.strokeStyle='rgba(80,170,255,0.85)';ctx.lineWidth=2.2;ctx.stroke();

    // Head highlight
    ctx.beginPath();ctx.ellipse(-H*0.25,-H*0.18,H*0.55,H*0.32,0,0,Math.PI*2);
    ctx.fillStyle='rgba(100,190,255,0.32)';ctx.fill();

    // ── Upper jaw (snout) ─────────────────────────────────────────────────
    ctx.beginPath();ctx.moveTo(H*0.5,H*0.08);
    ctx.bezierCurveTo(H*1.2,-H*0.05, H*1.7,-H*0.20, H*2.1,-H*0.08);
    ctx.bezierCurveTo(H*1.9,H*0.22, H*1.1,H*0.28, H*0.5,H*0.22);
    ctx.closePath();
    ctx.fillStyle='rgba(15,65,185,0.92)';ctx.fill();
    ctx.strokeStyle='rgba(70,160,255,0.75)';ctx.lineWidth=1.8;ctx.stroke();

    // ── Lower jaw ─────────────────────────────────────────────────────────
    ctx.beginPath();ctx.moveTo(H*0.5,H*0.22);
    ctx.bezierCurveTo(H*1.1,H*0.32, H*1.6,H*0.55, H*2.0,H*0.65);
    ctx.bezierCurveTo(H*1.5,H*0.72, H*0.8,H*0.62, H*0.45,H*0.48);
    ctx.closePath();
    ctx.fillStyle='rgba(10,45,160,0.88)';ctx.fill();
    ctx.strokeStyle='rgba(60,150,255,0.65)';ctx.lineWidth=1.5;ctx.stroke();

    // ── Teeth (upper & lower) ─────────────────────────────────────────────
    ctx.fillStyle='rgba(210,240,255,0.95)';
    // Upper teeth
    for(let i=0;i<5;i++){
      const tx=H*(0.6+i*0.29), ty=H*0.22;
      ctx.beginPath();ctx.moveTo(tx,ty);ctx.lineTo(tx+H*0.09,ty+H*0.22);ctx.lineTo(tx+H*0.18,ty);ctx.closePath();ctx.fill();
    }
    // Lower teeth
    for(let i=0;i<4;i++){
      const tx=H*(0.7+i*0.30), ty=H*0.42;
      ctx.beginPath();ctx.moveTo(tx,ty);ctx.lineTo(tx+H*0.08,ty-H*0.18);ctx.lineTo(tx+H*0.16,ty);ctx.closePath();ctx.fill();
    }

    // ── Glowing eyes ─────────────────────────────────────────────────────
    for(const[ex,ey] of [[-H*0.05,-H*0.30],[H*0.08,H*0.05]]){
      // Outer glow
      const eg=ctx.createRadialGradient(ex,ey,0,ex,ey,H*0.32);
      eg.addColorStop(0,'rgba(255,220,0,1)');eg.addColorStop(0.35,'rgba(255,120,0,0.85)');eg.addColorStop(1,'rgba(255,40,0,0)');
      ctx.beginPath();ctx.arc(ex,ey,H*0.32,0,Math.PI*2);ctx.fillStyle=eg;ctx.fill();
      // Pupil
      ctx.beginPath();ctx.arc(ex,ey,H*0.13,0,Math.PI*2);ctx.fillStyle='rgba(20,0,0,0.92)';ctx.fill();
      // Pupil slit
      ctx.beginPath();ctx.ellipse(ex,ey,H*0.04,H*0.12,0,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,0.97)';ctx.fill();
    }

    // ── Horns ─────────────────────────────────────────────────────────────
    for(const sy of [-1,1]){
      ctx.beginPath();ctx.moveTo(-H*0.35,sy*H*0.35);
      ctx.bezierCurveTo(-H*0.7,sy*H*0.85, -H*0.5,sy*H*1.4, -H*0.25,sy*H*1.65);
      ctx.strokeStyle='rgba(120,200,255,0.85)';ctx.lineWidth=5*hS;ctx.lineCap='round';ctx.stroke();
    }

    // ── Nostrils ──────────────────────────────────────────────────────────
    ctx.beginPath();ctx.ellipse(H*1.4,-H*0.22,H*0.07,H*0.05,-0.25,0,Math.PI*2);
    ctx.fillStyle='rgba(5,20,90,0.85)';ctx.fill();

    // ── Water breath blast at mouth ────────────────────────────────────────
    if(headProgress>0.7){
      const bA=Math.min(1,(headProgress-0.7)/0.2);
      const bx=H*2.2, by=H*0.15;
      const bg=ctx.createRadialGradient(bx,by,0,bx,by,H*1.4*bA);
      bg.addColorStop(0,'rgba(255,255,255,0.95)');
      bg.addColorStop(0.25,'rgba(180,230,255,0.8)');
      bg.addColorStop(0.6,'rgba(60,160,255,0.5)');
      bg.addColorStop(1,'rgba(0,80,220,0)');
      ctx.beginPath();ctx.arc(bx,by,H*1.4*bA,0,Math.PI*2);ctx.fillStyle=bg;ctx.fill();
      // Breath stream
      ctx.beginPath();ctx.moveTo(bx,by);
      ctx.lineTo(bx+H*3*bA,by-H*0.3*bA);
      ctx.strokeStyle=`rgba(200,240,255,${0.6*bA})`;ctx.lineWidth=H*0.55*bA;ctx.lineCap='round';ctx.stroke();
    }

    ctx.restore();
  }

  ctx.restore();
}

function drawEffect(ctx,lm,cw,ch){
  if(!effActive) return;
  const t=Math.min(1,(Date.now()-effStart)/EFF_DUR);
  if(t>=1){effActive=false;return;}
  const use=lm||lastLM;
  if(use&&!fireOriginY) fireOriginY=ch*0.20;
  switch(effType){
    case'rasengan': if(use) drawRasengan(ctx,use,t,cw,ch); break;
    case'chidori':  if(use) drawChidori(ctx,use,t,cw,ch);  break;
    case'fireball': drawFireball(ctx,use,t,cw,ch); break;
    case'water':    drawWater(ctx,use,t,cw,ch);    break;
  }
}

// ── Game state ────────────────────────────────────────────────────────────────
let cJ=null,cStep=0,holdT=null,holdS=0;
const HOLD_MS=950;

function setSt(msg,state){
  document.getElementById('status-text').textContent=msg;
  const d=document.getElementById('sdot');
  d.className='sdot'+(state==='on'?' on':state==='warn'?' warn':'');
}
function setConf(v){
  document.getElementById('conf-fill').style.width=(v*100)+'%';
  document.getElementById('conf-pct').textContent=Math.round(v*100)+'%';
}
function setHold(v){document.getElementById('hold-fill').style.width=(v*100)+'%';}

function renderSeal(){
  const sn=document.getElementById('seal-name'),
        sw=document.getElementById('seal-img-wrap'),
        sh=document.getElementById('seal-hint'),
        sl=document.getElementById('seal-step');
  if(!cJ){sn.style.display='none';sh.style.display='none';
    sw.innerHTML='<div class="idle-msg">Pick a jutsu to begin training</div>';
    sl.textContent='Select a jutsu'; return;}
  if(cStep>=cJ.seals.length) return;
  const sId=cJ.seals[cStep],meta=SEAL_META[sId],img=SEAL_IMGS[sId];
  sl.textContent=`Seal ${cStep+1} of ${cJ.seals.length}`;
  sn.style.display='block'; sn.textContent=meta.label;
  sw.innerHTML=img?`<img src="${img}" style="max-width:250px;height:auto" alt="${meta.label}">`
                  :`<div style="color:var(--text3);font-size:13px">${meta.label}</div>`;
  sh.style.display='block'; sh.textContent=meta.hint;
}
function renderSeq(){
  const el=document.getElementById('seq-pills');
  if(!cJ){el.innerHTML='<span style="color:var(--text3);font-size:11px">—</span>';return;}
  el.innerHTML=cJ.seals.map((s,i)=>{
    const cls=i<cStep?'spill done':i===cStep?'spill active':'spill';
    return `<div class="${cls}">${SEAL_META[s]?.label||s}</div>`;
  }).join('');
}
function buildGrid(){
  const g=document.getElementById('jutsu-grid');
  JUTSU.forEach(j=>{
    const c=document.createElement('div');c.className='jcard';c.id='jc-'+j.id;
    c.innerHTML=`<span class="jcard-icon">${j.icon}</span>
      <div><div class="jcard-name">${j.name}</div><div class="jcard-rank">${j.rank} · ${j.seals.length} seals</div></div>`;
    c.onclick=()=>selectJ(j.id);g.appendChild(c);
  });
}
function selectJ(id){
  cJ=JUTSU.find(j=>j.id===id);cStep=0;holdT=null;holdS=0;effActive=false;cloneActive=false;
  fireOriginX=0; fireOriginY=0;
  document.querySelectorAll('.jcard').forEach(c=>c.classList.remove('active'));
  document.getElementById('jc-'+id).classList.add('active');
  document.getElementById('win-banner').style.display='none';
  if(cloneCtx) cloneCtx.clearRect(0,0,9999,9999);
  setHold(0);setConf(0);renderSeal();renderSeq();
}
function resetJutsu(){
  if(!cJ) return;
  cStep=0;holdT=null;holdS=0;effActive=false;cloneActive=false;
  if(cloneCtx) cloneCtx.clearRect(0,0,9999,9999);
  setHold(0);setConf(0);
  document.getElementById('win-banner').style.display='none';
  renderSeal();renderSeq();setSt('Ready','on');
}
function advanceSeal(){
  cStep++;holdT=null;holdS=0;setHold(0);renderSeq();
  if(cStep>=cJ.seals.length){activateJutsu();}
  else{renderSeal();setSt(`Next: ${SEAL_META[cJ.seals[cStep]]?.label}`,'on');}
}
function activateJutsu(){
  setSt('JUTSU!','warn');
  startEffect(cJ.effect,lastLM);
  const fl=document.getElementById('jutsu-flash'),ft=document.getElementById('jutsu-flash-text');
  ft.textContent=cJ.flash;fl.style.display='flex';
  ft.style.animation='none';void ft.offsetWidth;ft.style.animation='jutsuBoom 2s ease forwards';
  setTimeout(()=>fl.style.display='none',2100);
  document.getElementById('win-banner').style.display='block';
  document.getElementById('win-name').textContent=cJ.icon+' '+cJ.flash;
  document.getElementById('win-desc').textContent=`${cJ.name} activated! Watch the AR effect on your camera.`;
  document.getElementById('seal-step').textContent='Jutsu Active';
  document.getElementById('seal-name').textContent=cJ.flash;
  document.getElementById('seal-img-wrap').innerHTML=`<div style="font-size:54px;padding:20px">${cJ.icon}</div>`;
  document.getElementById('seal-hint').style.display='none';
}

// ── Camera + MediaPipe ────────────────────────────────────────────────────────
async function startCamera(){
  const btn=document.getElementById('start-btn');
  btn.textContent='Starting...';btn.disabled=true;setSt('Requesting...','');
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:640,height:480}});
    const vid=document.getElementById('video');
    vid.srcObject=stream;
    await new Promise(r=>vid.onloadedmetadata=r);
    await vid.play();
    const ov=document.getElementById('overlay');
    const cc=document.getElementById('clone-canvas');
    ov.width=vid.videoWidth||640;ov.height=vid.videoHeight||480;
    cc.width=ov.width;cc.height=ov.height;
    lastCW=ov.width; lastCH=ov.height;
    btn.style.display='none';setSt('Camera active — select a jutsu!','on');
    initFrameCapture(vid,ov.width,ov.height);
    initMediaPipe(vid,ov);
  }catch(e){
    setSt('Camera error: '+e.message,'');btn.textContent='⚡ Enable Camera';btn.disabled=false;
  }
}

// ── SHADOW CLONE — 10-12 copies that hold for 3-4 seconds ────────────────────
const CLONE_DUR = 7000; // total effect: 7s (flash+smoke+hold+dissolve)
let smokeParts = [];

function seedSmoke(cw, ch){
  smokeParts = [];
  // 12 clone positions spread across the frame
  for(let i=0;i<12;i++){
    const cx = cw*(0.05 + i*0.085);
    const cy = ch*(0.3 + Math.sin(i*1.3)*0.2);
    for(let j=0;j<25;j++){
      const ang = Math.random()*Math.PI*2;
      const spd = 1.0 + Math.random()*2.5;
      smokeParts.push({
        cloneIdx:i, cx, cy,
        x:cx+(Math.random()-0.5)*15, y:cy+(Math.random()-0.5)*15,
        vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd-1.0,
        r:16+Math.random()*32, alpha:0.5+Math.random()*0.45,
        born:i*0.04 + Math.random()*0.08,
      });
    }
  }
}

function drawShadowClone(cw, ch){
  if(!cloneActive || !cloneCtx) return;
  const t = Math.min(1,(Date.now()-cloneStart)/CLONE_DUR);
  if(t >= 1){ cloneActive=false; cloneCtx.clearRect(0,0,cw,ch); return; }
  cloneCtx.clearRect(0,0,cw,ch);

  // Phase 0 (0–0.06): white flash
  if(t < 0.06){
    const f = t<0.03 ? t/0.03 : 1-(t-0.03)/0.03;
    cloneCtx.fillStyle = `rgba(255,255,255,${f*0.95})`;
    cloneCtx.fillRect(0,0,cw,ch);
    return;
  }

  // Grab frozen frame from just before activation
  const frozenIdx = Math.max(0, frameBuffer.length - 10);
  const frozen = frameBuffer[frozenIdx];

  // 12 clone positions spread across width, 2 rows
  const clonePositions = [];
  for(let i=0;i<12;i++){
    clonePositions.push({
      xOff: (i - 5.5) * cw * 0.085,  // spread from -2.3 to +2.3 widths
      row: i < 6 ? 0 : 1,
      stagger: i * 0.04,               // each clone appears slightly later
    });
  }

  // Clone alpha: staggered appear (0.08–0.35), hold (0.35–0.75), dissolve (0.75–1.0)
  if(frozen){
    vidCapCtx.putImageData(frozen, 0, 0);
    for(const pos of clonePositions){
      const appear = Math.max(0, (t - 0.08 - pos.stagger) / 0.22);
      const dissolve = t > 0.75 ? (t-0.75)/0.25 : 0;
      const alpha = Math.min(appear, 1) * (1 - dissolve) * 0.78;
      if(alpha <= 0.02) continue;

      cloneCtx.save();
      cloneCtx.globalAlpha = alpha;
      // Clone canvas has no CSS mirror so we flip manually
      cloneCtx.translate(cw, 0); cloneCtx.scale(-1,1);
      // Scale clones down to ~40% width so 12 fit
      const scale = 0.38;
      const destW = cw * scale;
      const destH = ch * scale;
      const destX = -(cw/2 + pos.xOff + destW/2);
      const destY = pos.row===0 ? ch*0.08 : ch*0.52;
      cloneCtx.drawImage(vidCapCanvas, -destX, destY, destW, destH);
      cloneCtx.restore();

      // Subtle blue-purple tint on each clone so they look like chakra copies
      cloneCtx.save();
      cloneCtx.globalAlpha = alpha * 0.35;
      cloneCtx.fillStyle = 'rgba(80,100,255,1)';
      cloneCtx.globalCompositeOperation = 'multiply';
      const destX2 = cw/2 + pos.xOff - destW/2;
      cloneCtx.fillRect(destX2, pos.row===0?ch*0.08:ch*0.52, destW, destH);
      cloneCtx.restore();
    }
  }

  // Smoke puffs — appear during 0.06–0.45, dissolve 0.75–1.0
  const smokeAlpha = t<0.06?0 : t<0.45?((t-0.06)/0.39) : t<0.75?1 : (1-(t-0.75)/0.25);
  if(smokeAlpha > 0){
    for(const p of smokeParts){
      const age = smokeAlpha - p.born; if(age<0) continue;
      const decay = Math.min(1, age/0.45);
      const px = p.x + p.vx*age*50;
      const py = p.y + p.vy*age*50;
      const radius = p.r*(0.3+decay*0.85);
      const a = p.alpha*(1-decay*0.88)*smokeAlpha;
      if(a <= 0.02) continue;
      const sg = cloneCtx.createRadialGradient(px,py,0,px,py,radius);
      sg.addColorStop(0,`rgba(225,235,255,${a})`);
      sg.addColorStop(0.5,`rgba(185,205,240,${a*0.55})`);
      sg.addColorStop(1,'rgba(150,180,220,0)');
      cloneCtx.beginPath(); cloneCtx.arc(px,py,radius,0,Math.PI*2);
      cloneCtx.fillStyle=sg; cloneCtx.fill();
    }
  }

  // Speed lines burst (0.06–0.20)
  if(t>0.06 && t<0.20){
    const lf=(t-0.06)/0.14;
    cloneCtx.save(); cloneCtx.globalAlpha=Math.sin(lf*Math.PI)*0.65;
    for(let i=0;i<36;i++){
      const ang=(i/36)*Math.PI*2;
      cloneCtx.beginPath();
      cloneCtx.strokeStyle='rgba(200,215,255,0.9)'; cloneCtx.lineWidth=1.0;
      cloneCtx.moveTo(cw/2+Math.cos(ang)*cw*0.03, ch/2+Math.sin(ang)*ch*0.03);
      cloneCtx.lineTo(cw/2+Math.cos(ang)*cw*0.65*lf, ch/2+Math.sin(ang)*ch*0.65*lf);
      cloneCtx.stroke();
    }
    cloneCtx.restore();
  }

  // 影分身の術 kanji — flashes at t≈0.3
  if(t>0.26 && t<0.48){
    const kf = t<0.32?(t-0.26)/0.06 : t<0.42?1 : (0.48-t)/0.06;
    cloneCtx.save();
    cloneCtx.globalAlpha = kf;
    cloneCtx.font = `900 ${Math.floor(ch*0.095)}px serif`;
    cloneCtx.fillStyle = 'rgba(255,255,255,0.97)';
    cloneCtx.textAlign = 'center';
    cloneCtx.shadowColor = 'rgba(120,160,255,1)';
    cloneCtx.shadowBlur = 28;
    cloneCtx.fillText('影分身の術', cw/2, ch*0.5);
    cloneCtx.restore();
  }

  // Dark vignette so clones frame feels cinematic
  const vg = cloneCtx.createRadialGradient(cw/2,ch/2,cw*0.05,cw/2,ch/2,cw*0.72);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,0.22)');
  cloneCtx.fillStyle = vg; cloneCtx.fillRect(0,0,cw,ch);
}


function initMediaPipe(vid,ov){
  const ctx=ov.getContext('2d');
  const cw=ov.width,ch=ov.height;
  const hands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}`});
  hands.setOptions({maxNumHands:2,modelComplexity:1,minDetectionConfidence:0.72,minTrackingConfidence:0.65});

  // Shadow clone update loop (separate from MediaPipe to keep smooth)
  setInterval(()=>drawShadowClone(cw,ch),33);

  hands.onResults(res=>{
    ctx.clearRect(0,0,cw,ch);
    const lm=res.multiHandLandmarks?.[0]||null;
    if(lm) lastLM=lm;
    if(res.multiHandLandmarks){
      for(const lmk of res.multiHandLandmarks){
        drawConnectors(ctx,lmk,HAND_CONNECTIONS,{color:'rgba(251,191,36,.65)',lineWidth:2});
        drawLandmarks(ctx,lmk,{color:'rgba(249,115,22,.85)',lineWidth:1,radius:3});
      }
    }
    drawEffect(ctx,lm,cw,ch);
    if(effActive||cloneActive) return;

    if(!lm){
      setConf(0);setHold(0);holdT=null;
      if(cJ&&cStep<cJ.seals.length) setSt('No hand — show your hand in frame','warn');
      document.getElementById('debug-text').textContent='No hand';return;
    }
    const tgt=cJ&&cStep<cJ.seals.length ? cJ.seals[cStep] : null;
    const g=detect(lm, tgt);
    const ts=(Math.abs(lm[4].x-lm[5].x)).toFixed(3);
    document.getElementById('debug-text').textContent=g?`${g} | spread:${ts}`:`— | ${ts}`;
    setConf(g?0.92:0.04);

    if(!cJ||cStep>=cJ.seals.length) return;
    if(g===tgt){
      const now=Date.now();
      if(holdT!==tgt){holdT=tgt;holdS=now;}
      const prog=Math.min(1,(now-holdS)/HOLD_MS);
      setHold(prog);setSt(`Holding ${SEAL_META[tgt]?.label}...`,'on');
      if(prog>=1) advanceSeal();
    }else{
      if(holdT===tgt){holdT=null;setHold(0);}
      setSt(g?`Got "${g}" — need "${SEAL_META[tgt]?.label}"`:`Form: ${SEAL_META[tgt]?.label}`,'');
    }
  });
  const cam=new Camera(vid,{onFrame:async()=>{await hands.send({image:vid});},width:640,height:480});
  cam.start();
}

window.addEventListener('load',()=>{
  const chk=setInterval(()=>{
    if(typeof Hands!=='undefined'&&typeof Camera!=='undefined'&&typeof drawConnectors!=='undefined'){
      clearInterval(chk);
      setTimeout(()=>{
        document.getElementById('loading-screen').style.display='none';
        document.getElementById('app').style.display='flex';
        buildGrid();
      },600);
    }
  },200);
  setTimeout(()=>{
    if(typeof Hands==='undefined')
      document.querySelector('.load-sub').textContent='Slow connection — check internet';
  },9000);
});
</script>
